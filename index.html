                                    {isSystemFixed ? (
                                        <span className={`whitespace-nowrap inline-block flex-shrink-0 ${themeStyles.actionText}`}>固定</span>
                                    ) : (
                                        <span 
                                            onClick={(e) => { e.stopPropagation(); setEditTargetBooking(booking); }} 
                                            className={`cursor-pointer z-10 whitespace-nowrap flex-shrink-0 hover:underline ${themeStyles.actionText}`}
                                        >
                                            編輯
                                        </span>
                                    )}
                                </div>
                            </div>
                            
                            {/* Bottom row: TA AND Cart */}
                            <div className="flex justify-between items-end w-full mt-auto gap-1">
                                <div className="text-[10px] sm:text-xs font-medium opacity-90 text-left whitespace-normal break-words leading-tight line-clamp-2 flex-1 min-w-0">
                                    {secondLine}
                                </div>
                                <div className="text-[12px] sm:text-[14px] font-black flex items-center justify-end whitespace-nowrap flex-shrink-0 text-gray-700 ml-auto text-right">
                                    <Truck size={12} className="mr-0.5 flex-shrink-0" /> {booking.cart.replace('號車', '')}
                                </div>
                            </div>
                        </div>
                    );
                };

                return (
                <div>
                    {renderDateSelector()}
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 overflow-x-auto w-full pb-4 print-overflow-visible print:p-0 print:border-none print:shadow-none">
                    
                    {/* 只在列印時顯示的版頭 */}
                    <div className="hidden print:block w-full mb-4 px-2">
                        <div className="flex justify-between items-end border-b-2 border-black pb-1">
                            <div className="text-xl font-bold">觀塘官立小學(秀明道)</div>
                            <div className="text-sm font-bold">列印日期: {getPrintDateString()}</div>
                        </div>
                        <div className="text-center text-2xl font-bold mt-3">
                            每週平板電腦(iPad)借用總表 ({generateCurrentWeekMsg(viewDate)})
                        </div>
                    </div>

                    <div className="flex flex-col mb-6 gap-4 overflow-hidden print-hide">
                        <h2 className="text-xl font-bold text-gray-800 flex flex-col sm:flex-row items-start sm:items-center flex-shrink-0">
                            <div className="flex items-center">
                                <Calendar className="mr-2 text-blue-600 flex-shrink-0" size={24} />
                                <span>{titleText}</span>
                            </div>
                            <span className="text-sm sm:text-xl font-bold text-gray-800 sm:ml-2 mt-1 sm:mt-0 flex flex-wrap items-center">
                                ({generateCurrentWeekMsg(viewDate)})
                                {mode === 'normal' && (loginRole === 'admin' || loginRole === 'office') && (
                                    <label className="ml-0 sm:ml-4 mt-2 sm:mt-0 flex items-center text-sm font-bold text-blue-800 cursor-pointer bg-blue-50 px-2 py-1 rounded border border-blue-200 shadow-sm whitespace-nowrap print-hide">
                                        <input
                                            type="checkbox"
                                            className="mr-1.5 w-4 h-4 text-blue-600 rounded focus:ring-blue-500 cursor-pointer"
                                            checked={isWeekArranged}
                                            onChange={() => handleWeekStatusToggle(currentMondayStr, isWeekArranged)}
                                        />
                                        已完成本週借用安排
                                    </label>
                                )}
                                {(mode === 'duty' || mode === 'office') && (
                                    <span className={`block w-full sm:inline sm:w-auto ml-0 sm:ml-3 mt-2 sm:mt-0 text-sm sm:text-lg whitespace-nowrap print-hide ${isWeekArranged ? 'text-blue-600' : 'text-red-500'}`}>
                                        {isWeekArranged ? '(可安排職工值崗)' : '(課堂編排尚未完成,請耐心等待)'}
                                    </span>
                                )}
                            </span>
                        </h2>
                        {/* 將車號顯示與半日上課設定包裝在一個容器內 */}
                        <div className="flex flex-col gap-3 w-full">
                            {/* 7. 車號過濾切換按鈕 */}
                            <div className="flex items-center gap-1 sm:gap-2 text-xs sm:text-sm font-medium w-full overflow-x-auto pb-1 sm:pb-0 scrollbar-hide print-hide">
                                <span className="text-gray-600 mr-1 sm:mr-2 font-bold whitespace-nowrap flex-shrink-0">顯示/隱藏：</span>
                                <button
                                    onClick={() => toggleCartVisibility('1號車')}
                                    className={`flex items-center px-2 py-1.5 sm:px-3 sm:py-1.5 rounded transition-colors border-2 flex-shrink-0 whitespace-nowrap ${visibleCarts.includes('1號車') ? 'text-blue-700 bg-blue-100 border-blue-300' : 'text-gray-400 bg-gray-50 border-gray-200 hover:bg-gray-100'}`}
                                >
                                    <Truck size={14} className="mr-1 sm:w-4 sm:h-4 w-3.5 h-3.5" /> 1號車
                                </button>
                                <button
                                    onClick={() => toggleCartVisibility('2號車')}
                                    className={`flex items-center px-2 py-1.5 sm:px-3 sm:py-1.5 rounded transition-colors border-2 flex-shrink-0 whitespace-nowrap ${visibleCarts.includes('2號車') ? 'text-green-700 bg-green-100 border-green-300' : 'text-gray-400 bg-gray-50 border-gray-200 hover:bg-gray-100'}`}
                                >
                                    <Truck size={14} className="mr-1 sm:w-4 sm:h-4 w-3.5 h-3.5" /> 2號車
                                </button>
                                <button
                                    onClick={() => toggleCartVisibility('3號車')}
                                    className={`flex items-center px-2 py-1.5 sm:px-3 sm:py-1.5 rounded transition-colors border-2 flex-shrink-0 whitespace-nowrap ${visibleCarts.includes('3號車') ? 'text-purple-700 bg-purple-100 border-purple-300' : 'text-gray-400 bg-gray-50 border-gray-200 hover:bg-gray-100'}`}
                                >
                                    <Truck size={14} className="mr-1 sm:w-4 sm:h-4 w-3.5 h-3.5" /> 3號車
                                </button>
                                {mode === 'normal' && isAdmin && (
                                    <>
                                    <button onClick={handleExportExcel} className="flex items-center px-2 py-1.5 sm:px-3 sm:py-1.5 rounded transition-colors border-2 text-blue-700 bg-blue-100 border-blue-300 hover:bg-blue-200 whitespace-nowrap flex-shrink-0">
                                        匯出檔案
                                    </button>
                                    <button onClick={handlePrintListFormat} className="flex items-center px-2 py-1.5 sm:px-3 sm:py-1.5 rounded transition-colors border-2 text-indigo-700 bg-indigo-100 border-indigo-300 hover:bg-indigo-200 whitespace-nowrap flex-shrink-0">
                                        列印檔案
                                    </button>
                                    </>
                                )}
                                {mode === 'office' && (loginRole === 'admin' || loginRole === 'office') && (
                                    <>
                                    <button onClick={handleExportOfficeExcel} className="flex items-center px-2 py-1.5 sm:px-3 sm:py-1.5 rounded transition-colors border-2 text-blue-700 bg-blue-100 border-blue-300 hover:bg-blue-200 whitespace-nowrap flex-shrink-0">
                                        匯出檔案
                                    </button>
                                    <button onClick={handlePrintOfficeFormat} className="flex items-center px-2 py-1.5 sm:px-3 sm:py-1.5 rounded transition-colors border-2 text-indigo-700 bg-indigo-100 border-indigo-300 hover:bg-indigo-200 whitespace-nowrap flex-shrink-0">
                                        列印檔案
                                    </button>
                                    </>
                                )}
                            </div>
                            
                            {/* 半日上課設定 */}
                            <div className="flex items-center gap-1 sm:gap-2 text-xs sm:text-sm font-medium w-full overflow-x-auto pb-1 sm:pb-0 scrollbar-hide print-hide border-t border-gray-200 pt-2 mt-1">
                                <span className="text-gray-600 mr-1 sm:mr-2 font-bold whitespace-nowrap flex-shrink-0">半日上課：</span>
                                {weekDates.map(wd => {
                                    const isHalfDay = weekHalfDays[currentMondayStr]?.[wd.dateStr] || false;
                                    const isDisabled = mode !== 'normal' || !isAdmin; // 只有管理員在「每週平板電腦借用總表」可以更改
                                    return (
                                        <label key={wd.dateStr} className={`flex items-center mr-2 sm:mr-4 ${isDisabled ? 'cursor-not-allowed opacity-60' : 'cursor-pointer hover:text-blue-600'}`}>
                                            <input
                                                type="checkbox"
                                                className={`mr-1.5 w-3.5 h-3.5 sm:w-4 sm:h-4 text-blue-600 rounded focus:ring-blue-500 ${isDisabled ? 'cursor-not-allowed' : 'cursor-pointer'}`}
                                                checked={isHalfDay}
                                                disabled={isDisabled}
                                                onChange={() => handleHalfDayToggle(currentMondayStr, wd.dateStr, isHalfDay)}
                                            />
                                            <span className="whitespace-nowrap">{wd.name}</span>
                                        </label>
                                    );
                                })}
                            </div>
                        </div>
                    </div>

                    <div className="print-overflow-visible overflow-x-auto">
                        <table className="w-full border-collapse border border-black schedule-table text-sm table-fixed min-w-[900px] md:min-w-[1200px] xl:min-w-full">
                        <thead>
                            <tr>
                            <th className="border border-black p-1 sm:p-2 bg-blue-100 text-center w-[120px] sm:w-36 min-w-[120px] sm:min-w-[9rem] shadow-sm align-middle">
                                <div className="text-[13px] sm:text-lg font-extrabold text-blue-900 leading-tight whitespace-nowrap">節數/時間</div>
                            </th>
                            {weekDates.map(wd => (
                                <th key={wd.name} className="border border-black p-1 sm:p-2 bg-blue-100 text-center text-blue-900 align-middle w-[16%]">
                                <div className="flex flex-col justify-center items-center w-full">
                                    <div className="w-full font-extrabold text-[13px] sm:text-lg text-center">{wd.display}</div>
                                    <div className="w-full font-bold text-[12px] sm:text-base text-center">{wd.name}</div>
                                </div>
                                </th>
                            ))}
                            </tr>
                        </thead>
                        <tbody>
                            {PERIODS.map(period => {
                            if (period.isBreak) {
                                const isBlackBold = ['小息', '小休', '午膳', '午息'].includes(period.name);
                                return (
                                <tr key={period.id} className="bg-gray-50">
                                    <td className={`border border-black p-1 sm:p-2 text-center ${isBlackBold ? 'text-black font-extrabold text-base sm:text-lg' : 'text-gray-700 font-bold text-sm sm:text-base'}`} colSpan={6}>
                                    {period.name} ({period.time})
                                    </td>
                                </tr>
                                );
                            }

                            let periodNameClass = "font-extrabold mb-0.5 sm:mb-1 text-gray-900 whitespace-nowrap transition-all ";
                            let periodTimeClass = "font-bold tracking-tighter whitespace-nowrap leading-none flex flex-col space-y-0.5 text-gray-800 transition-all ";

                            if (mode === 'normal') {
                                if (visibleCarts.length >= 3) {
                                    periodNameClass += "text-lg sm:text-2xl mt-2";
                                    periodTimeClass += "text-sm sm:text-base mb-2";
                                } else if (visibleCarts.length === 2) {
                                    periodNameClass += "text-base sm:text-xl mt-1";
                                    periodTimeClass += "text-xs sm:text-sm mb-1";
                                } else {
                                    periodNameClass += "text-sm sm:text-lg";
                                    periodTimeClass += "text-[10px] sm:text-xs";
                                }
                            } else {
                                periodNameClass += "text-sm sm:text-lg";
                                periodTimeClass += "text-[10px] sm:text-xs";
                            }

                            return (
                                <tr key={period.id}>
                                <td className="border border-black p-1 sm:p-2 bg-gray-200 text-center align-middle w-[120px] sm:w-36 min-w-[120px] sm:min-w-[9rem]">
                                    <div className={periodNameClass}>{period.name}</div>
                                    <div className={periodTimeClass}>
                                        <span>{period.time}</span>
                                    </div>
                                </td>
                                {weekDates.map(wd => {
                                    const cellBookings = bookings.filter(b =>
                                    (b.isSystem && b.day === wd.name && b.period === period.id) ||
                                    (b.isRecurring && b.day === wd.name && b.period === period.id) ||
                                    (!b.isSystem && !b.isRecurring && b.date === wd.dateStr && b.period === period.id)
                                    );

                                    const dateSuffix = wd.dateStr.substring(5);
                                    const isDateBlackout = BLACKOUT_DATES[dateSuffix];
                                    const isSystemBlackout = cellBookings.some(b => b.isSystem);
                                    const visibleNonSystemBookings = cellBookings.filter(b => !b.isSystem && visibleCarts.includes(b.cart));

                                    if (isDateBlackout || (isSystemBlackout && !isAdmin && visibleNonSystemBookings.length === 0)) {
                                    const remark = isDateBlackout || cellBookings.find(b => b.isSystem).remark;
                                    return (
                                        <td key={`${wd.name}-${period.id}`} className="border border-black p-1 sm:p-2 align-middle text-center bg-[#f5f5dc]">
                                        <span className="text-black font-extrabold text-[15px]">{remark}</span>
                                        </td>
                                    );
                                    }

                                    const isOnlySystemRemark = isSystemBlackout && visibleNonSystemBookings.length === 0;

                                    return (
                                    <td
                                        key={`${wd.name}-${period.id}`}
                                        className={`border border-black p-1 sm:p-2 transition-colors ${isOnlySystemRemark ? 'align-middle text-center' : 'align-top'} ${isSystemBlackout ? 'bg-[#f5f5dc]' : ''} hover:bg-gray-50`}
                                        onDragOver={(e) => { if (isAdmin || !isSystemBlackout) e.preventDefault(); }}
                                        onDrop={(e) => handleDrop(e, wd.dateStr, period.id, wd.name)}
                                    >
                                        {isOnlySystemRemark ? (
                                            <div className={`flex items-center justify-center w-full h-full min-h-[65px] ${isAdmin ? 'border-2 border-transparent hover:border-dashed hover:border-gray-400 rounded transition-all' : ''}`}>
                                                <span className="font-extrabold text-[15px] text-black">{cellBookings.find(b => b.isSystem).remark}</span>
                                            </div>
                                        ) : (
                                            <div className="flex flex-col h-full space-y-1">
                                                {['1號車', '2號車', '3號車'].map((cartLabel) => {
                                                    if (!visibleCarts.includes(cartLabel)) return null;

                                                    const booking = cellBookings.find(b => b.cart === cartLabel && !b.isSystem);
                                                    if (!booking) {
                                                        if (isSystemBlackout) return null;
                                                        return (
                                                            // 加入固定高度 h-[65px] sm:h-[70px]，確保空缺的位置也有一樣的空間
                                                            <div key={`${cartLabel}-empty`} className="w-full rounded-lg border-2 border-dashed border-gray-200 flex items-center justify-center h-[65px] sm:h-[70px] mb-1 text-transparent select-none overflow-hidden">
                                                                {cartLabel}
                                                            </div>
                                                        );
                                                    }
                                                    return renderSimplifiedScheduleCard(booking);
                                                })}
                                            </div>
                                        )}
                                    </td>
                                    );
                                })}
                                </tr>
                            );
                            })}
                        </tbody>
                        <tfoot className="hidden print:table-footer-group">
                            <tr>
                                <td colSpan={weekDates.length + 1} className="h-[15mm] border-none bg-transparent"></td>
                            </tr>
                        </tfoot>
                        </table>
                    </div>
                </div>
                </div>
                );
            };

            const renderAdminModal = () => {
                if (!showAdminModal) return null;
                return (
                <div className="fixed inset-0 bg-black/50 z-[60] flex items-center justify-center p-4">
                    <div className="bg-white rounded-xl shadow-lg p-6 w-full max-w-sm">
                    <h3 className="text-lg font-bold text-gray-900 mb-4 flex items-center"><Lock className="mr-2" size={20} /> 管理員登入</h3>
                    <form onSubmit={(e) => {
                        e.preventDefault();
                        if (stringToHex(adminPassword) === '536d722d32353236') {
                        setIsAdmin(true);
                        setShowAdminModal(false);
                        setAdminPassword('');
                        showNotification('系統管理員登入成功！現在可編輯已確認之課堂。', 'success');
                        } else {
                        showNotification('密碼錯誤！', 'error');
                        }
                    }}>
                        <input
                        type="password"
                        value={adminPassword}
                        onChange={e => setAdminPassword(e.target.value)}
                        className="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none mb-4"
                        placeholder="請輸入系統管理員密碼"
                        autoFocus
                        />
                        <div className="flex justify-end space-x-2">
                        <button type="button" onClick={() => setShowAdminModal(false)} className="px-4 py-2 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg font-medium transition-colors">取消</button>
                        <button type="submit" className="px-4 py-2 text-white bg-blue-600 hover:bg-blue-700 rounded-lg font-medium transition-colors">登入</button>
                        </div>
                    </form>
                    </div>
                </div>
                );
            };

            const renderUnlockModal = () => {
                if (!unlockTargetId) return null;
                return (
                <div className="fixed inset-0 bg-black/50 z-[60] flex items-center justify-center p-4">
                    <div className="bg-white rounded-xl shadow-lg p-6 w-full max-w-sm">
                    <h3 className="text-lg font-bold text-gray-900 mb-4 flex items-center"><Unlock className="mr-2" size={20} /> 解除確認課堂</h3>
                    <p className="text-sm text-gray-600 mb-4">請輸入系統管理員密碼以解鎖此課堂：</p>
                    <form onSubmit={async (e) => {
                        e.preventDefault();
                        if (stringToHex(adminPassword) === '536d722d32353236') {
                        try {
                            if (!user) { showNotification('尚未登入', 'error'); return; }
                            const booking = bookings.find(b => String(b.id) === String(unlockTargetId));
                            await setDoc(getDocRef(String(unlockTargetId)), { ...booking, isConfirmed: false }, { merge: true });
                            setUnlockTargetId(null);
                            setAdminPassword('');
                            showNotification('已解除確認，現在可以修改、移動或刪除該課堂。', 'success');
                        } catch (error) {
                            console.error("解鎖失敗:", error);
                            showNotification(`解鎖失敗：${error.message}`, 'error');
                        }
                        } else {
                        showNotification('密碼錯誤！', 'error');
                        }
                    }}>
                        <input
                        type="password"
                        value={adminPassword}
                        onChange={e => setAdminPassword(e.target.value)}
                        className="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none mb-4"
                        placeholder="請輸入系統管理員密碼"
                        autoFocus
                        />
                        <div className="flex justify-end space-x-2">
                        <button type="button" onClick={() => { setUnlockTargetId(null); setAdminPassword(''); }} className="px-4 py-2 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg font-medium transition-colors">取消</button>
                        <button type="submit" className="px-4 py-2 text-white bg-blue-600 hover:bg-blue-700 rounded-lg font-medium transition-colors">解鎖</button>
                        </div>
                    </form>
                    </div>
                </div>
                );
            };

            const renderEditModal = () => {
                if (!editTargetBooking) return null;

                // 判斷編輯中是否為 2-6 年級科技課
                const isGrade2To6TechEdit = /^[2-6]/.test(editTargetBooking.className) && editTargetBooking.subject?.includes('科技');

                return (
                <div className="fixed inset-0 bg-black/50 z-[60] flex items-center justify-center p-4">
                    <div className="bg-white rounded-xl shadow-lg p-6 w-full max-w-md">
                    <h3 className="text-lg font-bold text-gray-900 mb-4 flex items-center"><ClipboardList className="mr-2 text-blue-600" size={20} /> 編輯課堂內容</h3>
                    <form onSubmit={async (e) => {
                        e.preventDefault();
                        if (!user) { showNotification('尚未登入', 'error'); return; }
                        
                        // 確保只有非循環借用（具備具體日期）才進行特殊日期的阻擋檢查
                        if (editTargetBooking.date) {
                            const dateSuffix = editTargetBooking.date.substring(5);
                            if (BLACKOUT_DATES[dateSuffix]) {
                                showNotification(`該日期為 ${BLACKOUT_DATES[dateSuffix]}，不可安排借用！`, 'error');
                                return;
                            }
                        }

                        if (!isAdmin && BLACKOUT_PERIODS[editTargetBooking.day] && BLACKOUT_PERIODS[editTargetBooking.day][editTargetBooking.period]) {
                            showNotification('無法移至特別課堂時段！', 'error');
                            return;
                        }

                        // 已移除：在此只作安排TA的工作，不需要檢查車號是否已借出

                        const { id, ...updateData } = editTargetBooking;
                        try {
                            // 若成功指派了 TA，則自動標記為已確認
                            if (updateData.ta && updateData.ta.trim() !== '') {
                                updateData.isConfirmed = true;
                            }
                            await setDoc(getDocRef(String(id)), { ...updateData }, { merge: true });
                            setEditTargetBooking(null);
                            showNotification('課堂資料已更新', 'success');
                        } catch (error) {
                            console.error("更新失敗:", error);
                            showNotification(`更新失敗：${error.message}`, 'error');
                        }
                    }}>
                        <div className="grid grid-cols-2 gap-4 mb-5">
                        <div className="space-y-1">
                            <label className="text-sm font-medium text-gray-700">班別</label>
                            <select value={editTargetBooking.className} onChange={e => {
                                const newClass = e.target.value;
                                const isTech = /^[2-6]/.test(newClass) && editTargetBooking.subject?.includes('科技');
                                setEditTargetBooking({ ...editTargetBooking, className: newClass, ta: isTech ? '' : editTargetBooking.ta });
                            }} className="w-full p-2 border rounded-lg outline-none bg-white">
                            {CLASSES.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                        </div>
                        <div className="space-y-1">
                            <label className="text-sm font-medium text-gray-700">科目</label>
                            <select value={editTargetBooking.subject} onChange={e => {
                                const newSubj = e.target.value;
                                const isTech = /^[2-6]/.test(editTargetBooking.className) && newSubj?.includes('科技');
                                setEditTargetBooking({ ...editTargetBooking, subject: newSubj, ta: isTech ? '' : editTargetBooking.ta });
                            }} className="w-full p-2 border rounded-lg outline-none bg-white">
                            {SUBJECTS.map(s => <option key={s} value={s}>{s}</option>)}
                            </select>
                        </div>
                        <div className="space-y-1">
                            <label className="text-sm font-medium text-gray-700">教師代號</label>
                            <select value={editTargetBooking.teacher} onChange={e => setEditTargetBooking({ ...editTargetBooking, teacher: e.target.value })} className="w-full p-2 border rounded-lg outline-none bg-white">
                            {TEACHERS.map(t => <option key={t} value={t}>{t}</option>)}
                            </select>
                        </div>
                        <div className="space-y-1">
                            <label className="text-sm font-medium text-gray-700">數量</label>
                            <input type="number" min="1" max="40" value={editTargetBooking.qty} onChange={e => setEditTargetBooking({ ...editTargetBooking, qty: parseInt(e.target.value) || 0 })} className="w-full p-2 border rounded-lg outline-none" />
                        </div>
                        <div className="space-y-1">
                            <label className="text-sm font-medium text-gray-700">車號</label>
                            <select value={editTargetBooking.cart} onChange={e => setEditTargetBooking({ ...editTargetBooking, cart: e.target.value })} className="w-full p-2 border rounded-lg outline-none bg-white">
                            <option value="1號車">1號車</option>
                            <option value="2號車">2號車</option>
                            <option value="3號車">3號車</option>
                            </select>
                        </div>
                        <div className="space-y-1">
                            <label className="text-sm font-medium text-gray-700">負責TA</label>
                            <select value={editTargetBooking.ta} onChange={e => setEditTargetBooking({ ...editTargetBooking, ta: e.target.value })} className="w-full p-2 border rounded-lg outline-none bg-white">
                            <option value="">無</option>
                            {TAS.map(ta => <option key={ta} value={ta}>{ta}</option>)}
                            </select>
                        </div>
                        <div className="space-y-1">
                            <label className="text-sm font-medium text-gray-700">節數</label>
                            <select value={editTargetBooking.period} onChange={e => setEditTargetBooking({ ...editTargetBooking, period: parseInt(e.target.value) })} className="w-full p-2 border rounded-lg outline-none bg-white">
                            {PERIODS.filter(p => !p.isBreak).map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                            </select>
                        </div>
                        </div>
                        <div className="flex justify-end space-x-2">
                        <button type="button" onClick={() => setEditTargetBooking(null)} className="px-4 py-2 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg font-medium transition-colors">取消</button>
                        <button type="submit" className="px-4 py-2 text-white bg-blue-600 hover:bg-blue-700 rounded-lg font-medium transition-colors">儲存變更</button>
                        </div>
                    </form>
                    </div>
                </div>
                );
            }

            const renderAssignWorkerModal = () => {
                if (!assignWorkerTarget) return null;
                return (
                <div className="fixed inset-0 bg-black/50 z-[60] flex items-center justify-center p-4">
                    <div className="bg-white rounded-xl shadow-lg p-6 w-full max-w-sm">
                    <h3 className="text-lg font-bold text-gray-900 mb-4 flex items-center"><ClipboardList className="mr-2 text-blue-600" size={20} /> 安排職務 (指派職工)</h3>
                    <form onSubmit={async (e) => {
                        e.preventDefault();
                        if (!user) { showNotification('尚未登入', 'error'); return; }
                        try {
                            // 使用 setDoc 及 merge，確保如果是內建課堂(固定班)也能成功寫入資料庫
                            await setDoc(getDocRef(String(assignWorkerTarget.id)), { ...assignWorkerTarget, workerCode: assignWorkerTarget.workerCode || '' }, { merge: true });
                            setAssignWorkerTarget(null);
                            showNotification('職工指派已更新', 'success');
                        } catch (error) {
                            console.error("更新失敗:", error);
                            showNotification(`更新失敗：${error.message}`, 'error');
                        }
                    }}>
                        <div className="space-y-3 mb-5">
                            <p className="text-sm text-gray-600 font-medium">班別/課堂：{assignWorkerTarget.className || assignWorkerTarget.remark} ({assignWorkerTarget.cart})</p>
                            <label className="text-sm font-medium text-gray-700 block">選擇職工代號：</label>
                            <select
                                value={assignWorkerTarget.workerCode || ''}
                                onChange={e => setAssignWorkerTarget({ ...assignWorkerTarget, workerCode: e.target.value })}
                                className="w-full p-2.5 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500 bg-white"
                            >
                                <option value="">職工代號</option>
                                {WORKERS.map(w => <option key={w} value={w}>{w}</option>)}
                            </select>
                        </div>
                        <div className="flex justify-end space-x-2">
                            <button type="button" onClick={() => setAssignWorkerTarget(null)} className="px-4 py-2 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg font-medium transition-colors">取消</button>
                            <button type="submit" className="px-4 py-2 text-white bg-blue-600 hover:bg-blue-700 rounded-lg font-medium transition-colors">儲存</button>
                        </div>
                    </form>
                    </div>
                </div>
                );
            };

            const renderUnconfirmedModal = () => {
                if (!unconfirmedAlert.show) return null;
                return (
                <div className="fixed inset-0 bg-black/50 z-[70] flex items-center justify-center p-4">
                    <div className="bg-white rounded-xl shadow-lg p-6 w-full max-w-md">
                        <h3 className="text-lg font-bold text-red-600 mb-3 flex items-center">
                            <AlertCircle className="mr-2" size={24} /> 尚未確認提示
                        </h3>
                        <div className="mb-5 text-sm text-gray-800">
                            <div className="mb-2 font-bold">以下車號,班別及借用課堂尚未確認,請盡快確認.</div>
                            <div className="max-h-60 overflow-y-auto space-y-1 bg-gray-50 p-3 rounded border">
                                {unconfirmedAlert.list.map((b, index) => {
                                    const wd = unconfirmedAlert.weekDates.find(w => b.date === w.dateStr || (b.isRecurring && b.day === w.name));
                                    return (
                                        <div key={b.id}>
                                            ({index + 1}) {wd?.display} {b.cart} 第{b.period}節 {b.className} {b.subject}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                        <div className="flex flex-col justify-center space-y-2">
                            <button 
                                onClick={() => setUnconfirmedAlert({ show: false, list: [], weekDates: [] })} 
                                className="px-8 py-2.5 text-white bg-blue-600 hover:bg-blue-700 rounded-lg font-bold transition-colors w-full"
                            >
                                確認
                            </button>
                            <button 
                                onClick={async () => {
                                    try {
                                        for (let b of unconfirmedAlert.list) {
                                            await setDoc(getDocRef(String(b.id)), { ...b, isConfirmed: true }, { merge: true });
                                        }
                                        showNotification('已成功將所有借用課堂設定成「已確認」。', 'success');
                                        setUnconfirmedAlert({ show: false, list: [], weekDates: [] });
                                    } catch (error) {
                                        console.error("批次設定確認失敗:", error);
                                        showNotification(`設定確認失敗：${error.message}`, 'error');
                                    }
                                }} 
                                className="px-8 py-2.5 text-white bg-[#800000] hover:bg-[#600000] rounded-lg font-bold transition-colors w-full shadow-sm"
                            >
                                全部借用課堂設定成「已確認」
                            </button>
                        </div>
                    </div>
                </div>
                );
            };

            const renderRearrangeModal = () => {
                if (!rearrangeConfirm) return null;
                return (
                <div className="fixed inset-0 bg-black/50 z-[70] flex items-center justify-center p-4">
                    <div className="bg-white rounded-xl shadow-lg p-6 w-full max-w-md">
                        <h3 className="text-lg font-bold text-blue-800 mb-3 flex items-center">
                            <Info className="mr-2" size={24} /> 系統自動調節提示
                        </h3>
                        <div className="mb-5 text-sm text-gray-800 space-y-2">
                            <p>為配合連堂或同班連續借用，目前無法直接分配同一部車輛。</p>
                            <p className="font-bold text-green-700">但系統可自動調節其他已借出的車號，為您騰出同班同車連堂的空間！</p>
                            <div className="bg-gray-50 p-3 rounded border text-xs mt-2">
                                <span className="font-bold text-gray-700">調節詳情：</span>
                                <ul className="list-disc pl-4 mt-1 space-y-1">
                                    {rearrangeConfirm.plan.rearrangements.map((r, i) => (
                                        <li key={i}>
                                            第{r.booking.period}節的 <span className="font-bold">{r.booking.className}班</span> ({r.booking.cart}) 將會被調至 <span className="font-bold text-blue-600">{r.newCart}</span>
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        </div>
                        <div className="flex justify-end space-x-2">
                            <button 
                                onClick={() => setRearrangeConfirm(null)} 
                                className="px-4 py-2 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg font-medium transition-colors"
                            >
                                取消
                            </button>
                            <button 
                                onClick={() => executeBooking(rearrangeConfirm.formData, rearrangeConfirm.plan)} 
                                className="px-4 py-2 text-white bg-blue-600 hover:bg-blue-700 rounded-lg font-bold transition-colors"
                            >
                                同意調節並借用
                            </button>
                        </div>
                    </div>
                </div>
                );
            };

            const renderDeleteModal = () => {
                if (!deleteConfirmId) return null;
                return (
                <div className="fixed inset-0 bg-black/50 z-[80] flex items-center justify-center p-4">
                    <div className="bg-white rounded-xl shadow-lg p-6 w-full max-w-sm text-center">
                        <div className="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                            <AlertCircle className="w-8 h-8 text-red-600" />
                        </div>
                        <h3 className="text-lg font-bold text-gray-900 mb-2">確認刪除紀錄？</h3>
                        <p className="text-sm text-gray-600 mb-6">此操作將無法復原，您確定要刪除這筆借用紀錄嗎？</p>
                        <div className="flex justify-center space-x-3">
                            <button onClick={() => setDeleteConfirmId(null)} className="flex-1 px-4 py-2 text-gray-700 bg-gray-100 hover:bg-gray-200 rounded-lg font-medium transition-colors">取消</button>
                            <button onClick={() => { deleteBooking(deleteConfirmId); setDeleteConfirmId(null); }} className="flex-1 px-4 py-2 text-white bg-red-600 hover:bg-red-700 rounded-lg font-medium transition-colors">確認刪除</button>
                        </div>
                    </div>
                </div>
                );
            };

            if (!loginRole) {
                return (
                    <div className="min-h-screen bg-gray-50 flex items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-xl shadow-lg max-w-sm w-full border border-gray-100">
                            <div className="flex justify-center mb-6 text-blue-600">
                                <MonitorSmartphone size={48} />
                            </div>
                            <h2 className="text-2xl font-extrabold text-center text-gray-800 mb-6">
                                <span className="block">觀塘官立小學(秀明道)</span>
                                <span className="block mt-1">平板電腦借用系統</span>
                            </h2>
                            <form onSubmit={handleLogin} className="space-y-5">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">請輸入登入密碼</label>
                                    <input
                                        type="password"
                                        value={loginPassword}
                                        onChange={e => setLoginPassword(e.target.value)}
                                        className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50 text-center text-xl tracking-widest"
                                        autoFocus
                                    />
                                </div>
                                <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-colors shadow-md">
                                    登入系統
                                </button>
                            </form>
                        </div>
                        {notification.show && (
                            <div className={`fixed top-4 right-4 z-50 px-6 py-3 rounded-lg shadow-lg flex items-center animate-bounce ${notification.type === 'error' ? 'bg-red-500 text-white' : 'bg-green-500 text-white'}`}>
                                {notification.type === 'error' ? <AlertCircle className="mr-2" /> : <CheckCircle2 className="mr-2" />}
                                {notification.message}
                            </div>
                        )}
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gray-50 text-gray-800 font-sans p-4 md:p-8 relative print:bg-white print:p-0">
                {renderDeleteModal()}
                {renderRearrangeModal()}
                {renderUnconfirmedModal()}
                {renderUnlockModal()}
                {renderEditModal()}
                {renderAssignWorkerModal()}
                <header className="max-w-5xl mx-auto mb-6 text-center relative pt-4 sm:pt-0 print-hide">
                    {/* 桌面版管理員登入按鈕保持原位 */}
                    <div className="absolute right-0 top-0 sm:right-2 sm:top-2 hidden sm:block">
                        <button onClick={handleLogout} className="flex items-center text-xs sm:text-sm font-bold text-red-600 bg-red-50 hover:bg-red-100 px-3 py-1.5 rounded-full transition-colors shadow-sm">
                        <Unlock size={14} className="mr-1" /> 登出 ({loginRole === 'admin' ? '系統管理員' : loginRole === 'office' ? '校務處' : '一般使用者'})
                        </button>
                    </div>
                    <h1 className="text-3xl font-extrabold text-gray-900 mb-2 tracking-tight">
                        <span className="block">觀塘官立小學(秀明道)</span>
                        <span className="block mt-1">平板電腦借用系統</span>
                    </h1>
                    {/* 4. 手機版管理員登入按鈕移至文字下一列靠右 */}
                    <div className="sm:hidden flex justify-end mt-2 pr-2">
                        <button onClick={handleLogout} className="flex items-center text-xs font-bold text-red-600 bg-red-50 hover:bg-red-100 px-3 py-1.5 rounded-full transition-colors shadow-sm">
                        <Unlock size={12} className="mr-1" /> 登出 ({loginRole === 'admin' ? '系統管理員' : loginRole === 'office' ? '校務處' : '一般使用者'})
                        </button>
                    </div>
                </header>

                <div className="max-w-5xl mx-auto mb-6 px-2 print-hide">
                    <div className="inline-flex flex-row bg-gray-200 rounded-lg p-1 gap-1 max-w-full overflow-x-auto scrollbar-hide snap-x">
                    {loginRole !== 'office' && (
                        <>
                        <button
                            onClick={() => setActiveTab('form')}
                            className={`flex flex-none justify-center items-center px-3 py-3 sm:px-6 rounded-md font-bold text-sm sm:text-lg transition-all whitespace-nowrap snap-center ${activeTab === 'form' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-600 hover:text-gray-900 hover:bg-gray-300'
                            }`}
                        >
                            <ClipboardList className="w-4 h-4 sm:w-5 sm:h-5 mr-1.5" />
                            <span className="sm:hidden">借用表</span>
                            <span className="hidden sm:inline">填寫借用表</span>
                        </button>
                        <button
                            onClick={() => setActiveTab('records')}
                            className={`flex flex-none justify-center items-center px-3 py-3 sm:px-6 rounded-md font-bold text-sm sm:text-lg transition-all whitespace-nowrap snap-center ${activeTab === 'records' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-600 hover:text-gray-900 hover:bg-gray-300'
                            }`}
                        >
                            <List className="w-4 h-4 sm:w-5 sm:h-5 mr-1.5" />
                            <span className="sm:hidden">借用清單</span>
                            <span className="hidden sm:inline">借用紀錄清單</span>
                        </button>
                        </>
                    )}
                    <button
                        onClick={() => setActiveTab('schedule')}
                        className={`flex flex-none justify-center items-center px-3 py-3 sm:px-6 rounded-md font-bold text-sm sm:text-lg transition-all whitespace-nowrap snap-center ${activeTab === 'schedule' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-600 hover:text-gray-900 hover:bg-gray-300'
                        }`}
                    >
                        <Calendar className="w-4 h-4 sm:w-5 sm:h-5 mr-1.5" />
                        <span className="sm:hidden">總表(課室)</span>
                        <span className="hidden sm:inline">本週總表</span>
                    </button>
                    {(loginRole === 'admin' || loginRole === 'office') && (
                        <>
                        <button
                            onClick={() => setActiveTab('duty')}
                            className={`flex flex-none justify-center items-center px-3 py-3 sm:px-6 rounded-md font-bold text-sm sm:text-lg transition-all whitespace-nowrap snap-center ${activeTab === 'duty' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-600 hover:text-gray-900 hover:bg-gray-300'
                            }`}
                        >
                            <List className="w-4 h-4 sm:w-5 sm:h-5 mr-1.5" />
                            <span className="sm:hidden">安排職務</span>
                            <span className="hidden sm:inline">安排職務(校務處)</span>
                        </button>
                        <button
                            onClick={() => setActiveTab('office_schedule')}
                            className={`flex flex-none justify-center items-center px-3 py-3 sm:px-6 rounded-md font-bold text-sm sm:text-lg transition-all whitespace-nowrap snap-center ${activeTab === 'office_schedule' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-600 hover:text-gray-900 hover:bg-gray-300'
                            }`}
                        >
                            <Calendar className="w-4 h-4 sm:w-5 sm:h-5 mr-1.5" />
                            <span className="sm:hidden">總表(校務處)</span>
                            <span className="hidden sm:inline">每週總表(校務處)</span>
                        </button>
                        </>
                    )}
                    </div>
                </div>

                {notification.show && (
                    <div className={`fixed top-4 right-4 z-50 px-6 py-3 rounded-lg shadow-lg flex items-center animate-bounce print-hide ${notification.type === 'error' ? 'bg-red-500 text-white' : 'bg-green-500 text-white'
                    }`}>
                    {notification.type === 'error' ? <AlertCircle className="mr-2" /> : <CheckCircle2 className="mr-2" />}
                    {notification.message}
                    </div>
                )}

                <div className="max-w-5xl mx-auto print:max-w-none print:w-full">
                    {activeTab === 'form' && renderForm()}
                    {activeTab === 'records' && renderRecords()}
                    {activeTab === 'schedule' && renderSchedule('normal')}
                    {activeTab === 'duty' && renderSchedule('duty')}
                    {activeTab === 'office_schedule' && renderSchedule('office')}
                </div>
                </div>
            );
        }

        // 啟動 React 應用
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

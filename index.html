            const [notification, setNotification] = useState({ show: false, message: '', type: '' });
            const [isAdmin, setIsAdmin] = useState(false);
            const [showAdminModal, setShowAdminModal] = useState(false);
            const [unlockTargetId, setUnlockTargetId] = useState(null);
            const [adminPassword, setAdminPassword] = useState('');
            const [editTargetBooking, setEditTargetBooking] = useState(null);
            const [assignWorkerTarget, setAssignWorkerTarget] = useState(null); // 用於儲存要指派職工的課堂
            const [weekStatuses, setWeekStatuses] = useState({}); // 儲存各週是否已完成編排的狀態

            // 根據星期四下午4時後自動顯示下星期的邏輯
            const defaultDateStr = (() => {
                if (isPastThursdayCutoff()) {
                    return getDateStrFromMonday(7); // 下星期一
                }
                return getLocalYYYYMMDD(new Date());
            })();
            const defaultDateObj = new Date(defaultDateStr);
            const defaultDayIdx = defaultDateObj.getDay();
            const defaultFormDay = (defaultDayIdx === 0 || defaultDayIdx === 6) ? '週末(不可借用)' : DAYS[defaultDayIdx - 1];

            const [viewDate, setViewDate] = useState(defaultDateStr);
            
            const [loginRole, setLoginRole] = useState(null); // 'user', 'admin', 'office'
            const [loginPassword, setLoginPassword] = useState('');
            
            // 7. 新增管理車號顯示的狀態
            const [visibleCarts, setVisibleCarts] = useState(['1號車', '2號車', '3號車']);
            
            // 用於儲存「安排職務」與「校務處總表」個別的本地獨立備註
            const [customNotes, setCustomNotes] = useState({});

            const [formData, setFormData] = useState({
                date: defaultDateStr,
                day: defaultFormDay,
                periods: [1],
                className: '',
                subject: '',
                teacher: '',
                qty: 35,
                ta: ''
            });

            // --- 簡單前端混淆工具 ---
            // 將明文轉換為 16進位 字串，防止瀏覽器直接查看 index.html 時肉眼看見明文密碼
            const stringToHex = (str) => {
                return Array.from(str || '').map(c => c.charCodeAt(0).toString(16).padStart(2, '0')).join('');
            };

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            try {
                                await signInWithCustomToken(auth, __initial_auth_token);
                            } catch (tokenError) {
                                console.warn("Token 不匹配，改用匿名登入:", tokenError);
                                await signInAnonymously(auth);
                            }
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (error) {
                        console.error("驗證失敗:", error);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubscribeBookings = onSnapshot(getCollRef(), (snapshot) => {
                    const cloudData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setDbBookings(cloudData);
                }, (error) => {
                    console.error("讀取資料失敗:", error);
                });

                const getWeekStatusCollRef = () => isLocalDeploy ? collection(db, 'week_status') : collection(db, 'artifacts', appId, 'public', 'data', 'week_status');
                const unsubscribeWeekStatus = onSnapshot(getWeekStatusCollRef(), (snapshot) => {
                    const statuses = {};
                    snapshot.forEach(doc => {
                        statuses[doc.id] = doc.data().isArranged;
                    });
                    setWeekStatuses(statuses);
                }, (error) => {
                    console.error("讀取週狀態失敗:", error);
                });

                return () => {
                    unsubscribeBookings();
                    unsubscribeWeekStatus();
                };
            }, [user]);

            const showNotification = (message, type = 'success') => {
                setNotification({ show: true, message, type });
                setTimeout(() => setNotification({ show: false, message: '', type: '' }), 5000); // 延長提示時間以便閱讀
            };

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                if (name === 'date') {
                    const d = new Date(value);
                    const dayIdx = d.getDay();
                    let newDay = '週末(不可借用)';
                    if (dayIdx >= 1 && dayIdx <= 5) newDay = DAYS[dayIdx - 1];
                    setFormData(prev => ({ ...prev, date: value, day: newDay }));
                } else {
                    setFormData(prev => ({ ...prev, [name]: value }));
                }
            };

            const handlePeriodToggle = (periodId) => {
                setFormData(prev => {
                    const periods = prev.periods.includes(periodId)
                        ? prev.periods.filter(p => p !== periodId)
                        : [...prev.periods, periodId].sort((a, b) => a - b);
                    return { ...prev, periods };
                });
            };

            // 1. 增加連堂優先安排相同車號之邏輯判定
            const planAssignments = (date, day, periods, subject, className) => {
                const isGrade2To6Tech = /^[2-6]/.test(className) && subject.includes('科技');
                let assignments = {};

                const getAvailableCarts = (pid) => {
                    if (BLACKOUT_PERIODS[day] && BLACKOUT_PERIODS[day][pid]) return [];
                    const currentBookings = bookings.filter(b =>
                        !b.isSystem &&
                        b.period === pid &&
                        (b.date === date || (b.isRecurring && b.day === day))
                    );
                    const usedCarts = currentBookings.map(b => b.cart);
                    const avail = [];
                    if (!usedCarts.includes('1號車')) avail.push('1號車');
                    if (!usedCarts.includes('2號車')) avail.push('2號車');
                    return avail;
                };

                // 2-6 年級科技課獨立處理
                if (isGrade2To6Tech) {
                    for (let pid of periods) {
                        if (BLACKOUT_PERIODS[day] && BLACKOUT_PERIODS[day][pid]) {
                            return { success: false, message: `第${pid}節為 ${BLACKOUT_PERIODS[day][pid]}，暫停借用。` };
                        }
                        const currentBookings = bookings.filter(b => !b.isSystem && b.period === pid && (b.date === date || (b.isRecurring && b.day === day)));
                        if (currentBookings.some(b => b.cart === '3號車')) {
                            return { success: false, message: `第${pid}節的 3號車 已被借用。` };
                        }
                        assignments[pid] = '3號車';
                    }
                    return { success: true, assignments };
                }

                // 處理普通課堂的連堂邏輯
                const pairs = [[1, 2], [3, 4], [5, 6], [7, 8]];
                let remainingPeriods = [...periods];

                for (let pair of pairs) {
                    if (periods.includes(pair[0]) && periods.includes(pair[1])) {
                        const avail0 = getAvailableCarts(pair[0]);
                        const avail1 = getAvailableCarts(pair[1]);
                        const common = avail0.filter(c => avail1.includes(c));

                        if (common.length === 0) {
                            return { success: false, message: `無法為連堂 (第${pair[0]},${pair[1]}節) 安排同一部車輛，請嘗試其他時段或分開單獨預約。` };
                        }
                        // 優先安排共同可用的車號
                        assignments[pair[0]] = common[0];
                        assignments[pair[1]] = common[0];
                        remainingPeriods = remainingPeriods.filter(p => p !== pair[0] && p !== pair[1]);
                    }
                }

                // 處理剩下的單節課
                for (let pid of remainingPeriods) {
                    const avail = getAvailableCarts(pid);
                    if (avail.length === 0) {
                        return { success: false, message: `第${pid}節的 1號及2號車 均已被借出。` };
                    }
                    assignments[pid] = avail[0];
                }

                return { success: true, assignments };
            };

            const handleSubmit = async (e) => {
                e.preventDefault();

                if (!user) {
                    showNotification('系統尚未完成登入，請稍後再試！', 'error');
                    return;
                }

                if (formData.day === '週末(不可借用)') {
                    showNotification('週末不提供借用服務，請重新選擇日期！', 'error');
                    return;
                }

                if (formData.periods.length === 0) {
                    showNotification('請至少選擇一節課節！', 'error');
                    return;
                }

                if (!formData.className || !formData.subject || !formData.teacher) {
                    showNotification('請填寫所有必要欄位 (班別、科目、教師代號)！', 'error');
                    return;
                }

                const nextMondayStr = getDateStrFromMonday(7);
                if (isPastThursdayCutoff() && formData.date < nextMondayStr) {
                    showNotification('星期四下午4時後已暫停本星期的預借服務，請預約下週或之後的日期。', 'error');
                    return;
                }

                // 使用新的統一排班計畫
                const plan = planAssignments(formData.date, formData.day, formData.periods, formData.subject, formData.className);
                if (!plan.success) {
                    showNotification(plan.message, 'error');
                    return;
                }

                let newBookings = [];
                for (let pid of formData.periods) {
                    newBookings.push({
                        date: formData.date,
                        day: formData.day,
                        className: formData.className,
                        subject: formData.subject,
                        teacher: formData.teacher,
                        qty: formData.qty,
                        ta: formData.ta,
                        period: pid,
                        cart: plan.assignments[pid],
                        isConfirmed: false
                    });
                }

                try {
                    for (let b of newBookings) {
                        await addDoc(getCollRef(), b);
                    }
                    showNotification(`成功借用！已為您安排 ${formData.periods.length} 節課堂。`);
                    setFormData(prev => ({ ...prev, className: '', subject: '', teacher: '', ta: '', periods: [1] }));
                } catch (error) {
                    console.error("寫入資料庫失敗:", error);
                    if (error.code === 'permission-denied') {
                        showNotification('權限不足：請檢查 Firebase Firestore 規則是否允許寫入！', 'error');
                    } else {
                        showNotification(`寫入失敗：${error.message}`, 'error');
                    }
                }
            };

            const deleteBooking = async (id) => {
                if (!user) {
                    showNotification('尚未登入', 'error');
                    return;
                }
                try {
                    await deleteDoc(getDocRef(id));
                    showNotification('管理員已刪除該借用紀錄。', 'success');
                } catch (error) {
                    console.error("刪除失敗:", error);
                    showNotification(`刪除失敗：${error.message}`, 'error');
                }
            };

            const confirmBooking = async (id) => {
                if (!user) {
                    showNotification('尚未登入', 'error');
                    return;
                }
                try {
                    await updateDoc(getDocRef(id), { isConfirmed: true });
                    showNotification('已確認借用，該課堂現在不能再作改動。', 'success');
                } catch (error) {
                    console.error("確認失敗:", error);
                    showNotification(`確認失敗：${error.message}`, 'error');
                }
            };

            const handleDrop = async (e, newDate, newPeriod, newDay, targetCart = null) => {
                e.preventDefault();
                if (!user) {
                    showNotification('尚未登入', 'error');
                    return;
                }
                const bookingId = e.dataTransfer.getData('bookingId');
                if (!bookingId) return;

                const booking = bookings.find(b => b.id.toString() === bookingId);
                if (!booking) return;

                if (BLACKOUT_PERIODS[newDay] && BLACKOUT_PERIODS[newDay][newPeriod]) {
                    showNotification('無法移至特別課堂時段！', 'error');
                    return;
                }

                const cartToCheck = targetCart || booking.cart;

                if (cartToCheck === '3號車') {
                    const isGrade2To6Tech = /^[2-6]/.test(booking.className) && booking.subject.includes('科技');
                    if (!isGrade2To6Tech) {
                        showNotification('調動失敗：3號車僅限 2-6年級科技課 使用！', 'error');
                        return;
                    }
                }

                const conflict = bookings.some(b =>
                    b.period === newPeriod &&
                    b.cart === cartToCheck &&
                    b.id.toString() !== bookingId &&
                    (b.date === newDate || (b.isRecurring && b.day === newDay))
                );

                if (conflict) {
                    showNotification(`該時段的 ${cartToCheck} 已被其他班級佔用！`, 'error');
                    return;
                }

                try {
                    await updateDoc(getDocRef(bookingId), {
                        date: newDate,
                        day: newDay,
                        period: newPeriod,
                        cart: cartToCheck
                    });
                    showNotification('成功調動借用課節位置！', 'success');
                } catch (error) {
                    console.error("調動失敗:", error);
                    showNotification(`調動失敗：${error.message}`, 'error');
                }
            };

            const toggleCartVisibility = (cartLabel) => {
                setVisibleCarts(prev => 
                    prev.includes(cartLabel) 
                        ? prev.filter(c => c !== cartLabel) 
                        : [...prev, cartLabel]
                );
            };

            const handleWeekStatusToggle = async (mondayStr, currentValue) => {
                if (!user) return;
                try {
                    const ref = isLocalDeploy ? doc(db, 'week_status', mondayStr) : doc(db, 'artifacts', appId, 'public', 'data', 'week_status', mondayStr);
                    await setDoc(ref, { isArranged: !currentValue }, { merge: true });
                } catch (err) {
                    console.error("更新週狀態失敗:", err);
                    showNotification(`更新狀態失敗：${err.message}`, 'error');
                }
            };

            const handleExportExcel = () => {
                const weekDates = getWeekDates(viewDate);
                const printDate = getPrintDateString();
                
                const sortedCarts = [...visibleCarts].sort();
                let cartStr = sortedCarts.join('-');
                if (sortedCarts.length === 3 && sortedCarts.includes('1號車') && sortedCarts.includes('3號車')) {
                    cartStr = '1-3號車';
                }
                
                const weekNum = getISOWeek(new Date(weekDates[0].dateStr));
                const weekMsg = generateCurrentWeekMsg(viewDate);
                
                let tableHtml = `<table border="1">
                    <thead>
                        <tr>
                            <th colspan="3">觀塘官立小學(秀明道)</th>
                            <th colspan="${weekDates.length - 2}">列印日期: ${printDate}</th>
                        </tr>
                        <tr>
                            <th colspan="${weekDates.length + 1}">每週平板電腦(iPad)借用總表 (${weekMsg})</th>
                        </tr>
                        <tr>
                            <th>節數/時間</th>`;
                weekDates.forEach(wd => {
                    tableHtml += `<th>${wd.display} (${wd.name})</th>`;
                });
                tableHtml += `</tr>
                    </thead>
                    <tbody>`;
                
                PERIODS.forEach(period => {
                    if (period.isBreak) {
                        tableHtml += `<tr><td colspan="${weekDates.length + 1}">${period.name} (${period.time})</td></tr>`;
                        return;
                    }
                    tableHtml += `<tr><td>${period.name}<br/>${period.time}</td>`;
                    weekDates.forEach(wd => {
                        const cellBookings = bookings.filter(b => 
                            (b.isSystem && b.day === wd.name && b.period === period.id) ||
                            (b.isRecurring && b.day === wd.name && b.period === period.id) ||
                            (!b.isSystem && !b.isRecurring && b.date === wd.dateStr && b.period === period.id)
                        );
                        
                        const isBlackout = cellBookings.some(b => b.isSystem);
                        if (isBlackout) {
                            const remark = cellBookings.find(b => b.isSystem).remark;
                            tableHtml += `<td>${remark}</td>`;
                        } else {
                            let cellText = "";
                            ['1號車', '2號車', '3號車'].filter(c => visibleCarts.includes(c)).forEach(cartLabel => {
                                const booking = cellBookings.find(b => b.cart === cartLabel);
                                if (booking) {
                                    let workerStr = booking.workerCode ? ` [職工:${booking.workerCode}]` : "";
                                    let taStr = booking.ta ? ` (TA:${booking.ta})` : "";
                                    cellText += `${cartLabel}: ${booking.className} ${booking.subject} (${booking.teacher})${workerStr}${taStr}<br/>`;
                                }
                            });
                            tableHtml += `<td>${cellText}</td>`;
                        }
                    });
                    tableHtml += `</tr>`;
                });
                tableHtml += `</tbody></table>`;

                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = tableHtml;
                const wb = window.XLSX.utils.table_to_book(tempDiv.querySelector('table'), { raw: true });
                window.XLSX.writeFile(wb, `平板電腦總表-${cartStr}-第${weekNum}週_${printDate}.xlsx`);
            };

            const handlePrint = () => {
                window.print();
            };

            const handleLogin = (e) => {
                e.preventDefault();
                const inputHex = stringToHex(loginPassword);
                
                // 比對的字串皆為密碼明文的 16進位編碼，隱藏原始密碼

                if (inputHex === '536d722d3132333435') {
                    setLoginRole('user');
                    setIsAdmin(false);
                    showNotification('登入成功！一般使用者模式');
                } else if (inputHex === '536d722d32353236') {
                    setLoginRole('admin');
                    setIsAdmin(true);
                    showNotification('登入成功！系統管理員模式');
                } else if (inputHex === '536d722d32363038') {
                    setLoginRole('office');
                    setIsAdmin(false);
                    setActiveTab('schedule');
                    showNotification('登入成功！校務處模式');
                } else {
                    showNotification('密碼錯誤！', 'error');
                }
                setLoginPassword('');
            };

            const handleLogout = () => {
                setLoginRole(null);
                setIsAdmin(false);
                setLoginPassword('');
                setActiveTab('form');
                showNotification('已登出系統');
            };

            const getWeekDates = (dateStr) => {
                const d = new Date(dateStr || new Date());
                const day = d.getDay() || 7;
                const monday = new Date(d);
                monday.setDate(d.getDate() - day + 1);

                return DAYS.map((name, i) => {
                    const curr = new Date(monday);
                    curr.setDate(monday.getDate() + i);
                    return {
                        name,
                        dateStr: getLocalYYYYMMDD(curr),
                        display: `${curr.getMonth() + 1}月${curr.getDate()}日`
                    };
                });
            };

            const renderBookingCard = (booking, themeStyles, viewOnly = false) => {
                const isGrade1Tech = /^[1][A-E]/.test(booking.className) && booking.subject?.includes('科技');
                const isSystemFixed = (booking.isRecurring || (booking.cart === '3號車' && booking.subject?.includes('科技'))) && !isGrade1Tech;
                const isLocked = isSystemFixed || (booking.isConfirmed && !isAdmin);
                const isDraggable = !isSystemFixed && (!booking.isConfirmed || isAdmin) && !viewOnly;

                return (
                    <div
                        key={booking.id}
                        draggable={isDraggable}
                        onDragStart={(e) => { if (isDraggable) e.dataTransfer.setData('bookingId', booking.id); }}
                        className={`p-2 rounded border relative w-full h-full min-h-[76px] flex flex-col justify-between ${isDraggable ? 'group cursor-move hover:shadow-md cursor-pointer' : 'opacity-95'} shadow-sm transition-shadow ${themeStyles.bg} ${themeStyles.border}`}
                        title={viewOnly ? "" : (isSystemFixed ? "固定課堂，不可調動或修改" : (booking.isConfirmed ? "點擊解除確認(需輸入管理員密碼)" : "老師/管理員：可按住拖曳以調動，或點擊編輯修改內容"))}
                    >
                        {isDraggable && (
                        <div className="absolute -top-2 -right-2 opacity-0 group-hover:opacity-100 bg-gray-800 text-white p-1 rounded-full pointer-events-none transition-opacity z-20">
                            <GripVertical size={12} />
                        </div>
                        )}

                        <div>
                            <div className="flex justify-between items-start mb-0.5">
                                <div className="font-bold text-sm text-gray-800 leading-tight whitespace-nowrap">
                                {booking.className} {booking.subject}({booking.teacher})
                                </div>
                                
                                <div className="flex items-center ml-1">
                                    {!viewOnly && !isSystemFixed && !booking.isConfirmed && (
                                        <span onClick={(e) => { e.stopPropagation(); confirmBooking(booking.id); }} className="cursor-pointer text-blue-700 bg-blue-100 hover:bg-blue-200 px-1 py-0.5 rounded text-[10px] font-bold transition-all z-10">確認</span>
                                    )}
                                    {!viewOnly && !isSystemFixed && booking.isConfirmed && (
                                        <span
                                            onClick={(e) => {
                                            e.stopPropagation();
                                            if (isAdmin) {
                                                if (!user) { showNotification('尚未登入', 'error'); return; }
                                                updateDoc(getDocRef(booking.id), { isConfirmed: false })
                                                .then(() => showNotification('已解除確認，現在可作修改。', 'success'))
                                                .catch((error) => showNotification(`解除確認失敗：${error.message}`, 'error'));
                                            } else {
                                                setUnlockTargetId(booking.id);
                                            }
                                            }}
                                            className="text-green-600 font-bold text-[10px] cursor-pointer hover:underline z-10 whitespace-nowrap"
                                            title="點擊解除確認(需輸入管理員密碼)"
                                        >
                                            已確認
                                        </span>
                                    )}
                                    {!viewOnly && isSystemFixed && (
                                        <span className="text-[10px] font-bold text-purple-700 bg-purple-100 px-1 rounded whitespace-nowrap">固定</span>
                                    )}
                                    {viewOnly && (booking.isConfirmed || isSystemFixed) && (
                                        <span className={`text-[10px] font-bold px-1 rounded whitespace-nowrap ${isSystemFixed ? 'text-purple-700 bg-purple-100' : 'text-green-600'}`}>
                                            {isSystemFixed ? '固定' : '已確認'}
                                        </span>
                                    )}
                                </div>
                            </div>

                            <div className="text-xs text-gray-600 whitespace-nowrap mb-0.5">
                                {booking.subject?.includes('科技') && !booking.className?.startsWith('1')
                                    ? `師: ${booking.teacher}`
                                    : (booking.ta === 'Issac' || booking.ta === 'Ming' ? `ITRO: ${booking.ta}` : (booking.ta === 'Stephanie' ? `ITRA: ${booking.ta}` : `TA: ${booking.ta || ''}`))}
                            </div>
                        </div>

                        <div className="flex justify-between items-end mt-1">
                            <div className="text-[10px] font-bold flex items-center text-gray-500">
                                <Truck size={10} className="mr-0.5" /> {booking.cart}
                            </div>
                            {!viewOnly && !isSystemFixed && !booking.isConfirmed && (
                                <div className="flex items-center space-x-1">
                                    <span onClick={(e) => { e.stopPropagation(); setEditTargetBooking(booking); }} className="cursor-pointer opacity-0 group-hover:opacity-100 text-white bg-green-700 hover:bg-green-800 px-1 py-0.5 rounded text-[10px] font-bold transition-all z-10">編輯</span>
                                    <span onClick={(e) => { e.stopPropagation(); deleteBooking(booking.id); }} className="cursor-pointer opacity-0 group-hover:opacity-100 text-red-600 bg-red-100 hover:bg-red-200 px-1 py-0.5 rounded text-[10px] font-bold transition-all z-10">刪除</span>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            const renderDateSelector = () => {
                const thisWeek = getDateStrFromMonday(0);
                const nextWeek = getDateStrFromMonday(7);
                const weekAfterNext = getDateStrFromMonday(14);

                return (
                    <div className="mb-6 flex flex-col sm:flex-row items-start sm:items-center bg-white p-3 rounded-lg border border-gray-200 shadow-sm gap-2 w-full sm:w-max print-hide">
                        <div className="flex items-center">
                        <Calendar className="mr-2 text-blue-600 flex-shrink-0" size={20} />
                        <label className="text-sm font-medium text-gray-700 mr-2 whitespace-nowrap">選擇檢視週次：</label>
                        </div>
                        <select
                        value={viewDate}
                        onChange={e => setViewDate(e.target.value)}
                        className="w-full sm:w-auto p-1.5 border rounded-md text-sm outline-none focus:ring-2 focus:ring-blue-500 text-gray-800 font-medium bg-gray-50 cursor-pointer"
                        >
                        <option value={thisWeek}>本週 - {generateCurrentWeekMsg(thisWeek)}</option>
                        <option value={nextWeek}>下週 - {generateCurrentWeekMsg(nextWeek)}</option>
                        <option value={weekAfterNext}>下下週 - {generateCurrentWeekMsg(weekAfterNext)}</option>
                        </select>
                        <span className="text-xs text-gray-500 block sm:inline whitespace-normal sm:whitespace-nowrap mt-1 sm:mt-0">(可預約未來兩星期的課室平板電腦)</span>
                    </div>
                );
            };

            const renderForm = () => {
                let availabilityMsg = "";
                let isFull = false;

                if (formData.day === '週末(不可借用)') {
                    availabilityMsg = "週末不提供借用服務，請選擇星期一至星期五的日期。";
                    isFull = true;
                } else if (formData.periods.length === 0) {
                    availabilityMsg = "請點選欲借用的課節。";
                } else {
                    const nextMondayStr = getDateStrFromMonday(7);
                    const isBookingCurrentWeekAfterCutoff = isPastThursdayCutoff() && (formData.date < nextMondayStr);

                    if (isBookingCurrentWeekAfterCutoff) {
                        availabilityMsg = "系統提示：星期四下午4時後已暫停本星期的預借服務，請預約下週或之後的日期。";
                        isFull = true;
                    } else {
                        const plan = planAssignments(formData.date, formData.day, formData.periods, formData.subject, formData.className);
                        if (!plan.success) {
                            availabilityMsg = `注意：${plan.message}`;
                            isFull = true;
                        } else {
                            const isGrade2To6Tech = /^[2-6]/.test(formData.className) && formData.subject.includes('科技');
                            if (isGrade2To6Tech) {
                                availabilityMsg = `目前選取的 ${formData.periods.length} 節課 3號車 尚可借用。`;
                            } else {
                                availabilityMsg = `目前選取的 ${formData.periods.length} 節課尚有車輛可借用。系統將自動安排 (連堂將盡量安排同車)。`;
                            }
                        }
                    }
                }

                return (
                <div className="w-full md:max-w-4xl lg:max-w-5xl mx-auto bg-white p-6 md:p-10 rounded-xl shadow-sm border border-gray-100">
                    <div className="flex items-center space-x-2 md:space-x-3 mb-6 md:mb-8 pb-4 border-b">
                    <MonitorSmartphone className="text-blue-600 w-6 h-6 md:w-8 md:h-8" />
                    <h2 className="text-xl md:text-2xl font-bold text-gray-800">平板電腦借用申請</h2>
                    </div>

                    <form onSubmit={handleSubmit} className="space-y-5 md:space-y-8">
                    <div className="grid grid-cols-2 gap-4 md:gap-8">
                        <div className="space-y-1.5 md:space-y-2">
                        <label className="text-sm md:text-base font-medium text-gray-700">借用日期</label>
                        <input type="date" name="date" value={formData.date} onChange={handleInputChange} className="w-full p-2.5 md:p-3.5 md:text-lg border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required />
                        </div>
                        <div className="space-y-1.5 md:space-y-2">
                        <label className="text-sm md:text-base font-medium text-gray-700">星期</label>
                        <input type="text" name="day" value={formData.day} readOnly className="w-full p-2.5 md:p-3.5 md:text-lg border rounded-lg bg-gray-50 text-gray-500 outline-none cursor-not-allowed" />
                        </div>
                    </div>

                    <div className="space-y-2 md:space-y-3">
                        <label className="text-sm md:text-base font-medium text-gray-700 block">
                        課節 <span className="text-blue-600 text-xs md:text-sm ml-1">(若連堂借用，教師可多選連堂節數)</span>
                        </label>
                        <div className="flex flex-wrap gap-2 md:gap-3">
                        {PERIODS.filter(p => !p.isBreak).map(p => (
                            <button
                            key={p.id}
                            type="button"
                            onClick={() => handlePeriodToggle(p.id)}
                            className={`px-3.5 py-1.5 md:px-5 md:py-2.5 rounded-lg border text-sm md:text-base font-medium transition-colors ${formData.periods.includes(p.id)
                                ? 'bg-blue-600 text-white border-blue-600 shadow-sm'
                                : 'bg-white text-gray-600 border-gray-200 hover:bg-gray-50'
                                }`}
                            >
                            {p.name}
                            </button>
                        ))}
                        </div>
                    </div>

                    <div className="-mt-1 mb-2 md:mb-4 md:text-lg">
                        {isFull ? (
                        <span className="text-red-500 text-sm md:text-base flex items-center font-medium"><Info size={14} className="mr-1 md:w-5 md:h-5" /> {availabilityMsg}</span>
                        ) : (
                        <span className="text-green-600 text-sm md:text-base flex items-center font-medium"><Info size={14} className="mr-1 md:w-5 md:h-5" /> {availabilityMsg}</span>
                        )}
                    </div>

                    <div className="grid grid-cols-3 gap-4 md:gap-8 border-t pt-4 md:pt-8">
                        <div className="space-y-1.5 md:space-y-2">
                        <label className="text-sm md:text-base font-medium text-gray-700">班別</label>
                        <select name="className" value={formData.className} onChange={handleInputChange} className="w-full p-2.5 md:p-3.5 md:text-lg border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                            <option value="" disabled>選擇班別</option>
                            {CLASSES.map(c => <option key={c} value={c}>{c}</option>)}
                        </select>
                        </div>
                        <div className="space-y-1.5 md:space-y-2">
                        <label className="text-sm md:text-base font-medium text-gray-700">科目</label>
                        <select name="subject" value={formData.subject} onChange={handleInputChange} className="w-full p-2.5 md:p-3.5 md:text-lg border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                            <option value="" disabled>選擇科目</option>
                            {SUBJECTS.map(s => <option key={s} value={s}>{s}</option>)}
                        </select>
                        </div>
                        <div className="space-y-1.5 md:space-y-2">
                        <label className="text-sm md:text-base font-medium text-gray-700">教師代號</label>
                        <select name="teacher" value={formData.teacher} onChange={handleInputChange} className="w-full p-2.5 md:p-3.5 md:text-lg border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                            <option value="" disabled>選擇教師</option>
                            {TEACHERS.map(t => <option key={t} value={t}>{t}</option>)}
                        </select>
                        </div>
                    </div>

                    <div className="grid grid-cols-2 gap-4 md:gap-8">
                        <div className="space-y-1.5 md:space-y-2">
                        <label className="text-sm md:text-base font-medium text-gray-700">需要數量 (部)</label>
                        <input type="number" name="qty" value={formData.qty} onChange={handleInputChange} min="1" max="40" className="w-full p-2.5 md:p-3.5 md:text-lg border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                        </div>
                        <div className="space-y-1.5 md:space-y-2">
                        <label className="text-sm md:text-base font-medium text-gray-700">負責TA (選填)</label>
                        <select name="ta" value={formData.ta} onChange={handleInputChange} className="w-full p-2.5 md:p-3.5 md:text-lg border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                            <option value="">選擇TA (選填)</option>
                            {TAS.map(ta => <option key={ta} value={ta}>{ta}</option>)}
                        </select>
                        </div>
                    </div>

                    <div className="bg-blue-50 p-4 md:p-6 rounded-lg flex items-start space-x-3 text-sm md:text-base text-blue-800">
                        <div>
                        <p className="font-semibold mb-2">借用平板電腦的注意事項：</p>
                        <ol className="list-decimal pl-4 space-y-1 opacity-90">
                            <li>設定管理員可刪除或調動教師已設定借用的課堂(以方塊的形式移動借用課節位置)</li>
                            <li>教師可檢視及預約借用未來兩星期的課室平板電腦.每星期四下午4時會截數.</li>
                            <li>教師只可瀏覽本星期借用情況,並不設借用.(因已作安排)</li>
                            <li>供一至四年級課室借出的平板電腦為 1, 2號車。</li>
                            <li>系統會自動為「2-6年級科技課」指派 3號車,暫不安排借出給其他課堂使用。</li>
                            <li>如借用節數已被安排，系統會檢視並提示其他車號(1,2號)能否借用。</li>
                            <li>「綜合課」、「生教課」、「課外活動」為特別課堂，暫不開放借用。</li>
                            <li>如特別活動急需使用平板電腦進行活動,請與「資訊科技及數字教育組」聯絡,本組因應情況盡量安排.</li>
                        </ol>
                        </div>
                    </div>

                    <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 md:py-4 rounded-lg md:text-xl transition-colors flex justify-center items-center space-x-2">
                        <CheckCircle2 className="w-5 h-5 md:w-6 md:h-6 mr-2" />
                        <span>提交借用申請</span>
                    </button>
                    </form>
                </div>
                );
            };

            const renderCartRecords = (cartLabel, locationText, themeStyles) => {
                const weekDates = getWeekDates(viewDate);

                return (
                <div className={`mb-8 bg-white p-4 rounded-xl shadow-sm border ${themeStyles.border}`}>
                    <h3 className={`text-lg font-bold flex flex-col sm:flex-row sm:items-center mb-4 ${themeStyles.text}`}>
                    <div className="flex items-center">
                        <Truck className="mr-2" size={20} />
                        <span>{cartLabel} 借用紀錄表{locationText}</span>
                    </div>
                    <span className="text-sm font-bold text-black sm:ml-2 mt-1 sm:mt-0">
                        ({generateCurrentWeekMsg(viewDate)})
                    </span>
                    </h3>
                    <div className="overflow-x-auto w-full pb-4">
                        <table className="w-full border-collapse border border-black min-w-[1000px] table-fixed">
                            <thead>
                            <tr>
                                <th className="border border-black p-2 bg-blue-100 text-center w-36 text-lg text-blue-900 shadow-sm font-extrabold whitespace-nowrap">
                                節數/時間
                                </th>
                                {weekDates.map(wd => (
                                <th key={wd.name} className="border border-black p-2 bg-blue-100 text-center text-blue-900">
                                    <div className="font-extrabold text-lg">{wd.display}</div>
                                    <div className="font-bold text-base">{wd.name}</div>
                                </th>
                                ))}
                            </tr>
                            </thead>
                            <tbody>
                            {PERIODS.map(period => {
                                if (period.isBreak) {
                                    const isBlackBold = ['小息', '小休', '午膳', '午息'].includes(period.name);
                                    return (
                                        <tr key={period.id} className="bg-gray-50">
                                        <td className={`border border-black p-1 text-center ${isBlackBold ? 'text-black font-bold text-sm' : 'text-gray-500 text-xs font-medium'}`} colSpan={6}>
                                            {period.name} ({period.time})
                                        </td>
                                        </tr>
                                    );
                                }
                                return (
                                <tr key={period.id}>
                                    <td className="border border-black p-2 bg-gray-200 text-xs font-medium text-center align-middle w-36">
                                    <div className="font-bold text-sm mb-1 text-gray-800 whitespace-nowrap">{period.name}</div>
                                    <div className="text-gray-600 whitespace-nowrap">
                                        <span>{period.time}</span>
                                    </div>
                                    </td>
                                    {weekDates.map(wd => {
                                    const cellBookings = bookings.filter(b =>
                                        (b.isSystem && b.day === wd.name && b.period === period.id) ||
                                        (b.isRecurring && b.day === wd.name && b.period === period.id) ||
                                        (!b.isSystem && !b.isRecurring && b.date === wd.dateStr && b.period === period.id)
                                    );
                                    const isBlackout = cellBookings.some(b => b.isSystem);

                                    if (isBlackout) {
                                        const remark = cellBookings.find(b => b.isSystem).remark;
                                        return (
                                        <td key={`${wd.name}-${period.id}`} className="border border-black p-2 align-middle text-center bg-[#f5f5dc]">
                                            <span className="text-black font-extrabold text-[15px]">{remark}</span>
                                        </td>
                                        );
                                    }

                                    const booking = cellBookings.find(b => b.cart === cartLabel);

                                    return (
                                        <td
                                        key={`${wd.name}-${period.id}`}
                                        className="border border-black p-2 align-top transition-colors hover:bg-gray-50 h-full"
                                        onDragOver={(e) => e.preventDefault()}
                                        onDrop={(e) => handleDrop(e, wd.dateStr, period.id, wd.name, cartLabel)}
                                        >
                                        {booking ? renderBookingCard(booking, themeStyles) : (
                                            <div className="h-full w-full min-h-[76px] flex items-center justify-center text-transparent hover:text-gray-300 border-2 border-transparent hover:border-dashed hover:border-gray-300 rounded transition-all">
                                            可拖曳至此
                                            </div>
                                        )}
                                        </td>
                                    );
                                    })}
                                </tr>
                                )
                            })}
                            </tbody>
                        </table>
                    </div>
                </div>
                );
            };

            const renderRecords = () => (
                <div className="space-y-2 w-full max-w-full overflow-hidden">
                <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 mb-4 relative">
                    <h2 className="text-xl font-bold text-gray-800 flex flex-col sm:flex-row sm:items-center">
                    <div className="flex items-center">
                        <List className="mr-2 text-blue-600 flex-shrink-0" size={24} />
                        <span>借用紀錄清單</span>
                    </div>
                    <span className="text-base text-gray-600 sm:ml-2 mt-1 sm:mt-0">(按車輛分類時間表)</span>
                    </h2>

                    <div className="block sm:inline-block bg-blue-50 text-blue-800 px-3.5 py-2 rounded-md text-sm font-semibold border border-blue-100 shadow-sm mt-3 overflow-x-auto w-full sm:w-auto">
                    {generateBookingRangeMsg()}
                    </div>
                </div>

                {renderDateSelector()}
                {renderCartRecords('1號車', '(課室)', { border: 'border-blue-100', text: 'text-blue-700', bg: 'bg-blue-50 border-blue-200' })}
                {renderCartRecords('2號車', '(課室)', { border: 'border-green-100', text: 'text-green-700', bg: 'bg-green-50 border-green-200' })}
                {renderCartRecords('3號車', '(電腦室)', { border: 'border-purple-100', text: 'text-purple-700', bg: 'bg-purple-50 border-purple-200' })}
                </div>
            );

            const renderSchedule = (mode = 'normal') => {
                const weekDates = getWeekDates(viewDate);
                const currentMondayStr = weekDates[0].dateStr;
                const isWeekArranged = weekStatuses[currentMondayStr] || false;

                let titleText = "每週平板電腦(iPad) 借用總表";
                if (mode === 'duty') titleText = "安排職務總表(校務處)";
                if (mode === 'office') titleText = "本週總表(校務處)";

                // 2. 簡化版的顯示資訊卡片
                const renderSimplifiedScheduleCard = (booking) => {
                    let themeStyles = { bg: "bg-gray-100", border: "border-gray-200", text: "text-gray-800" };
                    if (booking.cart === '1號車') themeStyles = { bg: "bg-blue-50", border: "border-blue-300", text: "text-blue-900" };
                    if (booking.cart === '2號車') themeStyles = { bg: "bg-green-50", border: "border-green-300", text: "text-green-900" };
                    if (booking.cart === '3號車') themeStyles = { bg: "bg-purple-50", border: "border-purple-300", text: "text-purple-900" };

                    // 針對「安排職務總表」與「校務處總表」的專屬佈局格式
                    if (mode === 'duty' || mode === 'office') {
                        const isGrade2To6 = /^[2-6]/.test(booking.className);
                        return (
                            <div key={booking.id} className={`p-2 rounded-lg border w-full flex shadow-sm min-h-[70px] mb-1 ${themeStyles.bg} ${themeStyles.border} ${themeStyles.text}`}>
                                {/* 左半邊 */}
                                <div className="flex flex-col justify-between flex-1 pr-1 overflow-hidden">
                                    {/* 上方約2/3: 班別 (放大粗體) 及 編輯 */}
                                    <div className="flex items-center space-x-1.5">
                                        <div className="font-black text-3xl leading-none tracking-tight">
                                            {booking.className}
                                        </div>
                                        {mode === 'duty' && !isGrade2To6 && (
                                            <span onClick={(e) => { e.stopPropagation(); setAssignWorkerTarget(booking); }} className="cursor-pointer text-blue-700 bg-blue-100 hover:bg-blue-200 px-1.5 py-0.5 rounded-sm text-[11px] font-bold transition-colors z-10 whitespace-nowrap">
                                                編輯
                                            </span>
                                        )}
                                    </div>
                                    {/* 下方約1/3: 車號 */}
                                    <div className="flex items-center mt-auto pt-1">
                                        <div className="text-[11px] font-bold flex items-center whitespace-nowrap">
                                            <Truck size={12} className="mr-0.5" /> {booking.cart}
                                        </div>
                                    </div>
                                </div>
                                {/* 右半邊: 職工代號 / 電腦室 */}
                                <div className="w-[56px] flex-shrink-0 flex items-center justify-center border-l border-gray-300 border-opacity-40 pl-1 overflow-hidden">
                                    {booking.workerCode ? (
                                        <span className="font-black text-[40px] text-center leading-none">
                                            {booking.workerCode}
                                        </span>
                                    ) : (
                                        <span className="font-bold text-[13px] text-center text-gray-500 whitespace-nowrap tracking-tighter">
                                            {isGrade2To6 ? "電腦室" : "未指派"}
                                        </span>
                                    )}
                                </div>
                            </div>
                        );
                    }

                    let secondLine = '';
                    if (booking.cart === '3號車') {
                        secondLine = `科任老師: ${booking.teacher}`;
                    } else {
                        if (booking.ta === 'Issac' || booking.ta === 'Ming') {
                            secondLine = `ITRO: ${booking.ta}`;
                        } else if (booking.ta === 'Stephanie') {
                            secondLine = `ITRA: ${booking.ta}`;
                        } else if (booking.ta) {
                            secondLine = `TA: ${booking.ta}`;
                        } else {
                            secondLine = `科任老師: ${booking.teacher}`;
                        }
                    }

                    return (
                        <div key={booking.id} className={`p-2 rounded-lg border w-full flex flex-col justify-center shadow-sm min-h-[65px] mb-1 ${themeStyles.bg} ${themeStyles.border} ${themeStyles.text}`}>
                            <div className="flex justify-between items-center text-sm font-bold mb-1">
                                <span>{booking.className} {booking.subject}({booking.teacher})</span>
                                <span className="ml-1 whitespace-nowrap flex items-center">
                                    <Truck size={14} className="mr-0.5" /> {booking.cart}
                                </span>
                            </div>
                            <div className="text-sm font-medium opacity-90">
                                {secondLine}
                            </div>
                        </div>
                    );
                };

                return (
                <div>
                    {renderDateSelector()}
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 overflow-x-auto w-full pb-4 print-overflow-visible print:p-0 print:border-none print:shadow-none">
                    
                    {/* 只在列印時顯示的版頭 */}
                    <div className="hidden print:block w-full mb-4 px-2">
                        <div className="flex justify-between items-end border-b-2 border-black pb-1">
                            <div className="text-xl font-bold">觀塘官立小學(秀明道)</div>
                            <div className="text-sm font-bold">列印日期: {getPrintDateString()}</div>
                        </div>
                        <div className="text-center text-2xl font-bold mt-3">
                            每週平板電腦(iPad)借用總表 ({generateCurrentWeekMsg(viewDate)})
                        </div>
                    </div>

                    <div className="flex flex-col mb-6 gap-4 overflow-hidden print-hide">
                        <h2 className="text-xl font-bold text-gray-800 flex flex-col sm:flex-row items-start sm:items-center flex-shrink-0">
                            <div className="flex items-center">
                                <Calendar className="mr-2 text-blue-600 flex-shrink-0" size={24} />
                                <span>{titleText}</span>
                            </div>
                            <span className="text-sm sm:text-xl font-bold text-gray-800 sm:ml-2 mt-1 sm:mt-0 flex flex-wrap items-center">
                                ({generateCurrentWeekMsg(viewDate)})
                                {mode === 'normal' && (loginRole === 'admin' || loginRole === 'office') && (
                                    <label className="ml-0 sm:ml-4 mt-2 sm:mt-0 flex items-center text-sm font-bold text-blue-800 cursor-pointer bg-blue-50 px-2 py-1 rounded border border-blue-200 shadow-sm whitespace-nowrap print-hide">
                                        <input
                                            type="checkbox"
                                            className="mr-1.5 w-4 h-4 text-blue-600 rounded focus:ring-blue-500 cursor-pointer"
                                            checked={isWeekArranged}
                                            onChange={() => handleWeekStatusToggle(currentMondayStr, isWeekArranged)}
                                        />
                                        已完成本週借用安排
                                    </label>
                                )}
                                {(mode === 'duty' || mode === 'office') && (
                                    <span className={`ml-0 sm:ml-3 mt-2 sm:mt-0 text-sm sm:text-lg whitespace-nowrap print-hide ${isWeekArranged ? 'text-blue-600' : 'text-red-500'}`}>
                                        {isWeekArranged ? '(可安排職工值崗)' : '(課堂編排尚未完成,請耐心等待)'}
                                    </span>
                                )}
                            </span>
                        </h2>
                        {/* 7. 車號過濾切換按鈕 */}
                        <div className="flex items-center gap-1 sm:gap-2 text-xs sm:text-sm font-medium w-full overflow-x-auto pb-1 sm:pb-0 scrollbar-hide print-hide">
                            <span className="text-gray-600 mr-1 sm:mr-2 font-bold whitespace-nowrap flex-shrink-0">顯示/隱藏：</span>
                            <button
                                onClick={() => toggleCartVisibility('1號車')}
                                className={`flex items-center px-2 py-1.5 sm:px-3 sm:py-1.5 rounded transition-colors border-2 flex-shrink-0 whitespace-nowrap ${visibleCarts.includes('1號車') ? 'text-blue-700 bg-blue-100 border-blue-300' : 'text-gray-400 bg-gray-50 border-gray-200 hover:bg-gray-100'}`}
                            >
                                <Truck size={14} className="mr-1 sm:w-4 sm:h-4 w-3.5 h-3.5" /> 1號車
                            </button>
                            <button
                                onClick={() => toggleCartVisibility('2號車')}
                                className={`flex items-center px-2 py-1.5 sm:px-3 sm:py-1.5 rounded transition-colors border-2 flex-shrink-0 whitespace-nowrap ${visibleCarts.includes('2號車') ? 'text-green-700 bg-green-100 border-green-300' : 'text-gray-400 bg-gray-50 border-gray-200 hover:bg-gray-100'}`}
                            >
                                <Truck size={14} className="mr-1 sm:w-4 sm:h-4 w-3.5 h-3.5" /> 2號車
                            </button>
                            <button
                                onClick={() => toggleCartVisibility('3號車')}
                                className={`flex items-center px-2 py-1.5 sm:px-3 sm:py-1.5 rounded transition-colors border-2 flex-shrink-0 whitespace-nowrap ${visibleCarts.includes('3號車') ? 'text-purple-700 bg-purple-100 border-purple-300' : 'text-gray-400 bg-gray-50 border-gray-200 hover:bg-gray-100'}`}
                            >
                                <Truck size={14} className="mr-1 sm:w-4 sm:h-4 w-3.5 h-3.5" /> 3號車<span className="hidden sm:inline pl-1">(2-6年級科技課專用)</span>
                            </button>
                            <div className="flex-1"></div>
                            {mode === 'normal' && (
                                <>
                                <button onClick={handleExportExcel} className="flex items-center px-2 py-1.5 sm:px-3 sm:py-1.5 rounded transition-colors border-2 text-blue-700 bg-blue-100 border-blue-300 hover:bg-blue-200 whitespace-nowrap flex-shrink-0">
                                    匯出檔案
                                </button>
                                <button onClick={handlePrint} className="flex items-center px-2 py-1.5 sm:px-3 sm:py-1.5 rounded transition-colors border-2 text-indigo-700 bg-indigo-100 border-indigo-300 hover:bg-indigo-200 whitespace-nowrap flex-shrink-0">
                                    列印檔案
                                </button>
                                </>
                            )}
                        </div>
                    </div>

                    <div className="print-overflow-visible overflow-x-auto">
                    <table className="w-full border-collapse border border-black min-w-[1000px] table-fixed schedule-table">
                        <thead className="table-header-group">
                        <tr>
                            <th className="border border-black p-2 bg-blue-100 text-center w-36 text-lg text-blue-900 shadow-sm font-extrabold whitespace-nowrap">
                            節數/時間
                            </th>
                            {weekDates.map(wd => (
                            <th key={wd.name} className="border border-black p-3 bg-blue-100 text-center text-blue-900">
                                <div className="font-extrabold text-lg">{wd.display}</div>
                                <div className="font-bold text-base">{wd.name}</div>
                            </th>
                            ))}
                        </tr>
                        </thead>
                        <tbody>
                        {PERIODS.map((period) => {
                            if (period.isBreak) {
                            const isBlackBold = ['小息', '小休', '午膳', '午息'].includes(period.name);
                            return (
                                <tr key={period.id} className="bg-gray-100" style={{ pageBreakInside: 'avoid', breakInside: 'avoid' }}>
                                <td className={`border border-black p-2 text-center ${isBlackBold ? 'text-black font-bold text-sm' : 'text-gray-600 text-sm font-medium'}`} colSpan={6}>
                                    {period.name} {period.time && `(${period.time})`}
                                </td>
                                </tr>
                            );
                            }

                            // 因應揀選車號的多少自動調整節數及時間的文字大小
                            let nameSizeClass = "text-base sm:text-xl print:text-[14px]";
                            let timeSizeClass = "text-sm sm:text-base print:text-[12px]";
                            let cellPaddingClass = "p-2 sm:p-4 print:p-1";

                            if (visibleCarts.length === 2) {
                                nameSizeClass = "text-sm sm:text-base print:text-[12px]";
                                timeSizeClass = "text-xs sm:text-sm print:text-[10px]";
                                cellPaddingClass = "p-1.5 sm:p-2 print:p-0.5";
                            } else if (visibleCarts.length === 1) {
                                nameSizeClass = "text-xs sm:text-sm print:text-[10px]";
                                timeSizeClass = "text-[10px] sm:text-xs print:text-[8px]";
                                cellPaddingClass = "p-1 sm:p-1.5 print:p-0.5";
                            }

                            return (
                            <tr key={period.id} style={{ pageBreakInside: 'avoid', breakInside: 'avoid' }}>
                                <td className={`border border-black ${cellPaddingClass} bg-gray-200 font-medium text-center align-middle w-36`}>
                                <div className={`font-bold mb-0.5 text-gray-800 whitespace-nowrap ${nameSizeClass}`}>{period.name}</div>
                                <div className={`text-gray-600 whitespace-nowrap ${timeSizeClass}`}>
                                    <span>{period.time}</span>
                                </div>
                                </td>
                                {weekDates.map(wd => {
                                const cellBookings = bookings.filter(b =>
                                    (b.isSystem && b.day === wd.name && b.period === period.id) ||
                                    (b.isRecurring && b.day === wd.name && b.period === period.id) ||
                                    (!b.isSystem && !b.isRecurring && b.date === wd.dateStr && b.period === period.id)
                                );
                                const isBlackout = cellBookings.some(b => b.isSystem);

                                if (isBlackout) {
                                    const remark = cellBookings.find(b => b.isSystem).remark;
                                    return (
                                    <td key={`${wd.name}-${period.id}`} className="border border-black p-3 align-middle text-center bg-[#f5f5dc]">
                                        <span className="text-black font-extrabold text-base">{remark}</span>
                                    </td>
                                    );
                                }

                                return (
                                    <td
                                    key={`${wd.name}-${period.id}`}
                                    className="border border-black p-2 align-top bg-gray-50 transition-colors"
                                    >
                                    <div className="flex flex-col h-full space-y-1">
                                        {['1號車', '2號車', '3號車'].map((cartLabel) => {
                                            // 過濾未被選擇顯示的車號
                                            if (!visibleCarts.includes(cartLabel)) return null;

                                            const booking = cellBookings.find(b => b.cart === cartLabel);
                                            if (!booking) {
                                                // 預留對應方塊的空間
                                                return (
                                                    <div key={`${cartLabel}-empty`} className="w-full rounded-lg border-2 border-dashed border-gray-200 flex items-center justify-center min-h-[65px] text-transparent select-none">
                                                        {cartLabel}
                                                    </div>
                                                );
                                            }
                                            
                                            const card = renderSimplifiedScheduleCard(booking);
                                            return card;
                                        })}
                                    </div>
                                    </td>
                                );
                                })}
                            </tr>
                            );
                        })}
                        </tbody>
                    </table>
                    </div>
                </div>
                </div>
                );
            };

            const renderAdminModal = () => {
                if (!showAdminModal) return null;
                return (
                <div className="fixed inset-0 bg-black/50 z-[60] flex items-center justify-center p-4">
                    <div className="bg-white rounded-xl shadow-lg p-6 w-full max-w-sm">
                    <h3 className="text-lg font-bold text-gray-900 mb-4 flex items-center"><Lock className="mr-2" size={20} /> 管理員登入</h3>
                    <form onSubmit={(e) => {
                        e.preventDefault();
                        if (stringToHex(adminPassword) === '536d722d32353236') {
                        setIsAdmin(true);
                        setShowAdminModal(false);
                        setAdminPassword('');
                        showNotification('系統管理員登入成功！現在可編輯已確認之課堂。', 'success');
                        } else {
                        showNotification('密碼錯誤！', 'error');
                        }
                    }}>
                        <input
                        type="password"
                        value={adminPassword}
                        onChange={e => setAdminPassword(e.target.value)}
                        className="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none mb-4"
                        placeholder="請輸入系統管理員密碼"
                        autoFocus
                        />
                        <div className="flex justify-end space-x-2">
                        <button type="button" onClick={() => setShowAdminModal(false)} className="px-4 py-2 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg font-medium transition-colors">取消</button>
                        <button type="submit" className="px-4 py-2 text-white bg-blue-600 hover:bg-blue-700 rounded-lg font-medium transition-colors">登入</button>
                        </div>
                    </form>
                    </div>
                </div>
                );
            };

            const renderUnlockModal = () => {
                if (!unlockTargetId) return null;
                return (
                <div className="fixed inset-0 bg-black/50 z-[60] flex items-center justify-center p-4">
                    <div className="bg-white rounded-xl shadow-lg p-6 w-full max-w-sm">
                    <h3 className="text-lg font-bold text-gray-900 mb-4 flex items-center"><Unlock className="mr-2" size={20} /> 解除確認課堂</h3>
                    <p className="text-sm text-gray-600 mb-4">請輸入系統管理員密碼以解鎖此課堂：</p>
                    <form onSubmit={async (e) => {
                        e.preventDefault();
                        if (stringToHex(adminPassword) === '536d722d32353236') {
                        try {
                            if (!user) { showNotification('尚未登入', 'error'); return; }
                            await updateDoc(getDocRef(unlockTargetId), { isConfirmed: false });
                            setUnlockTargetId(null);
                            setAdminPassword('');
                            showNotification('已解除確認，現在可以修改、移動或刪除該課堂。', 'success');
                        } catch (error) {
                            console.error("解鎖失敗:", error);
                            showNotification(`解鎖失敗：${error.message}`, 'error');
                        }
                        } else {
                        showNotification('密碼錯誤！', 'error');
                        }
                    }}>
                        <input
                        type="password"
                        value={adminPassword}
                        onChange={e => setAdminPassword(e.target.value)}
                        className="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none mb-4"
                        placeholder="請輸入系統管理員密碼"
                        autoFocus
                        />
                        <div className="flex justify-end space-x-2">
                        <button type="button" onClick={() => { setUnlockTargetId(null); setAdminPassword(''); }} className="px-4 py-2 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg font-medium transition-colors">取消</button>
                        <button type="submit" className="px-4 py-2 text-white bg-blue-600 hover:bg-blue-700 rounded-lg font-medium transition-colors">解鎖</button>
                        </div>
                    </form>
                    </div>
                </div>
                );
            };

            const renderEditModal = () => {
                if (!editTargetBooking) return null;
                return (
                <div className="fixed inset-0 bg-black/50 z-[60] flex items-center justify-center p-4">
                    <div className="bg-white rounded-xl shadow-lg p-6 w-full max-w-md">
                    <h3 className="text-lg font-bold text-gray-900 mb-4 flex items-center"><ClipboardList className="mr-2 text-blue-600" size={20} /> 編輯課堂內容</h3>
                    <form onSubmit={async (e) => {
                        e.preventDefault();
                        if (!user) { showNotification('尚未登入', 'error'); return; }
                        
                        if (BLACKOUT_PERIODS[editTargetBooking.day] && BLACKOUT_PERIODS[editTargetBooking.day][editTargetBooking.period]) {
                            showNotification('無法移至特別課堂時段！', 'error');
                            return;
                        }

                        const conflict = bookings.some(b =>
                            b.period === editTargetBooking.period &&
                            b.cart === editTargetBooking.cart &&
                            b.id !== editTargetBooking.id &&
                            (b.date === editTargetBooking.date || (b.isRecurring && b.day === editTargetBooking.day))
                        );

                        if (conflict) {
                            showNotification(`該課節的 ${editTargetBooking.cart} 已被借用！`, 'error');
                            return;
                        }

                        const { id, ...updateData } = editTargetBooking;
                        try {
                            await updateDoc(getDocRef(id), updateData);
                            setEditTargetBooking(null);
                            showNotification('課堂資料已更新', 'success');
                        } catch (error) {
                            console.error("更新失敗:", error);
                            showNotification(`更新失敗：${error.message}`, 'error');
                        }
                    }}>
                        <div className="grid grid-cols-2 gap-4 mb-5">
                        <div className="space-y-1">
                            <label className="text-sm font-medium text-gray-700">班別</label>
                            <select value={editTargetBooking.className} onChange={e => setEditTargetBooking({ ...editTargetBooking, className: e.target.value })} className="w-full p-2 border rounded-lg outline-none bg-white">
                            {CLASSES.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                        </div>
                        <div className="space-y-1">
                            <label className="text-sm font-medium text-gray-700">科目</label>
                            <select value={editTargetBooking.subject} onChange={e => setEditTargetBooking({ ...editTargetBooking, subject: e.target.value })} className="w-full p-2 border rounded-lg outline-none bg-white">
                            {SUBJECTS.map(s => <option key={s} value={s}>{s}</option>)}
                            </select>
                        </div>
                        <div className="space-y-1">
                            <label className="text-sm font-medium text-gray-700">教師代號</label>
                            <select value={editTargetBooking.teacher} onChange={e => setEditTargetBooking({ ...editTargetBooking, teacher: e.target.value })} className="w-full p-2 border rounded-lg outline-none bg-white">
                            {TEACHERS.map(t => <option key={t} value={t}>{t}</option>)}
                            </select>
                        </div>
                        <div className="space-y-1">
                            <label className="text-sm font-medium text-gray-700">數量</label>
                            <input type="number" min="1" max="40" value={editTargetBooking.qty} onChange={e => setEditTargetBooking({ ...editTargetBooking, qty: parseInt(e.target.value) || 0 })} className="w-full p-2 border rounded-lg outline-none" />
                        </div>
                        <div className="space-y-1">
                            <label className="text-sm font-medium text-gray-700">車號</label>
                            <select value={editTargetBooking.cart} onChange={e => setEditTargetBooking({ ...editTargetBooking, cart: e.target.value })} className="w-full p-2 border rounded-lg outline-none bg-white">
                            <option value="1號車">1號車</option>
                            <option value="2號車">2號車</option>
                            <option value="3號車">3號車</option>
                            </select>
                        </div>
                        <div className="space-y-1">
                            <label className="text-sm font-medium text-gray-700">負責TA</label>
                            <select value={editTargetBooking.ta} onChange={e => setEditTargetBooking({ ...editTargetBooking, ta: e.target.value })} className="w-full p-2 border rounded-lg outline-none bg-white">
                            <option value="">無</option>
                            {TAS.map(ta => <option key={ta} value={ta}>{ta}</option>)}
                            </select>
                        </div>
                        <div className="space-y-1">
                            <label className="text-sm font-medium text-gray-700">節數</label>
                            <select value={editTargetBooking.period} onChange={e => setEditTargetBooking({ ...editTargetBooking, period: parseInt(e.target.value) })} className="w-full p-2 border rounded-lg outline-none bg-white">
                            {PERIODS.filter(p => !p.isBreak).map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                            </select>
                        </div>
                        </div>
                        <div className="flex justify-end space-x-2">
                        <button type="button" onClick={() => setEditTargetBooking(null)} className="px-4 py-2 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg font-medium transition-colors">取消</button>
                        <button type="submit" className="px-4 py-2 text-white bg-blue-600 hover:bg-blue-700 rounded-lg font-medium transition-colors">儲存變更</button>
                        </div>
                    </form>
                    </div>
                </div>
                );
            }

            const renderAssignWorkerModal = () => {
                if (!assignWorkerTarget) return null;
                return (
                <div className="fixed inset-0 bg-black/50 z-[60] flex items-center justify-center p-4">
                    <div className="bg-white rounded-xl shadow-lg p-6 w-full max-w-sm">
                    <h3 className="text-lg font-bold text-gray-900 mb-4 flex items-center"><ClipboardList className="mr-2 text-blue-600" size={20} /> 安排職務 (指派職工)</h3>
                    <form onSubmit={async (e) => {
                        e.preventDefault();
                        if (!user) { showNotification('尚未登入', 'error'); return; }
                        try {
                            // 使用 setDoc 及 merge，確保如果是內建課堂(固定班)也能成功寫入資料庫
                            await setDoc(getDocRef(String(assignWorkerTarget.id)), { ...assignWorkerTarget, workerCode: assignWorkerTarget.workerCode || '' }, { merge: true });
                            setAssignWorkerTarget(null);
                            showNotification('職工指派已更新', 'success');
                        } catch (error) {
                            console.error("更新失敗:", error);
                            showNotification(`更新失敗：${error.message}`, 'error');
                        }
                    }}>
                        <div className="space-y-3 mb-5">
                            <p className="text-sm text-gray-600 font-medium">班別/課堂：{assignWorkerTarget.className || assignWorkerTarget.remark} ({assignWorkerTarget.cart})</p>
                            <label className="text-sm font-medium text-gray-700 block">選擇職工代號：</label>
                            <select
                                value={assignWorkerTarget.workerCode || ''}
                                onChange={e => setAssignWorkerTarget({ ...assignWorkerTarget, workerCode: e.target.value })}
                                className="w-full p-2.5 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500 bg-white"
                            >
                                <option value="">-- 未指派 --</option>
                                {WORKERS.map(w => <option key={w} value={w}>{w}</option>)}
                            </select>
                        </div>
                        <div className="flex justify-end space-x-2">
                        <button type="button" onClick={() => setAssignWorkerTarget(null)} className="px-4 py-2 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg font-medium transition-colors">取消</button>
                        <button type="submit" className="px-4 py-2 text-white bg-blue-600 hover:bg-blue-700 rounded-lg font-medium transition-colors">儲存</button>
                        </div>
                    </form>
                    </div>
                </div>
                );
            };

            if (!loginRole) {
                return (
                    <div className="min-h-screen bg-gray-50 flex items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-xl shadow-lg max-w-sm w-full border border-gray-100">

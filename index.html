        function App() {
            const [activeTab, setActiveTab] = useState('form');
            const [user, setUser] = useState(null);
            const [dbBookings, setDbBookings] = useState([]);

            // 確保本地與雲端資料不重複合併

            const bookings = [...INITIAL_BOOKINGS.filter(b => !dbBookingIds.has(String(b.id))), ...dbBookings];

            const [notification, setNotification] = useState({ show: false, message: '', type: '' });
            
            // 透過 sessionStorage 讀取初始登入狀態，解決 reload 跳出問題
            const [loginRole, setLoginRole] = useState(() => sessionStorage.getItem('loginRole')); 
            const [isAdmin, setIsAdmin] = useState(() => sessionStorage.getItem('isAdmin') === 'true');
            
            const [showAdminModal, setShowAdminModal] = useState(false);
            const [unlockTargetId, setUnlockTargetId] = useState(null);
            const [adminPassword, setAdminPassword] = useState('');
            const [editTargetBooking, setEditTargetBooking] = useState(null);
            const [assignWorkerTarget, setAssignWorkerTarget] = useState(null); // 用於儲存要指派職工的課堂
            const [weekStatuses, setWeekStatuses] = useState({}); // 儲存各週是否已完成編排的狀態
            const [weekHalfDays, setWeekHalfDays] = useState({}); // 新增：儲存各週各日是否為半日上課
            const [unconfirmedAlert, setUnconfirmedAlert] = useState({ show: false, list: [], weekDates: [] }); // 新增：用於顯示未確認清單的彈出視窗狀態
            const [rearrangeConfirm, setRearrangeConfirm] = useState(null); // 新增：用於連堂自動調節確認
            const [deleteConfirmId, setDeleteConfirmId] = useState(null); // 新增：用於刪除確認視窗

            // 根據身份及截數時間決定表單預設日期
            const defaultDateStr = getUserDefaultDate(); // 載入頁面時預設為一般使用者視角
            const defaultDateObj = new Date(defaultDateStr);
            const defaultDayIdx = defaultDateObj.getDay();
            const defaultFormDay = (defaultDayIdx === 0 || defaultDayIdx === 6) ? '週末及週日(不可借用)' : DAYS[defaultDayIdx - 1];

            const defaultViewDateStr = (() => {
                if (isPastFridayCutoff()) return getDateStrFromMonday(0); // 星期五4時後顯示推移後的「本週」(即下星期)
                if (isPastThursdayCutoff()) return getDateStrFromMonday(7); // 星期四4時後預設看下星期
                return getLocalYYYYMMDD(new Date());
            })();
            const [viewDate, setViewDate] = useState(defaultViewDateStr);
            
            const [loginPassword, setLoginPassword] = useState('');
            
            // 7. 新增管理車號顯示的狀態
            const [visibleCarts, setVisibleCarts] = useState(['1號車', '2號車', '3號車']);
            
            // 用於儲存「安排職務」與「校務處總表」個別的本地獨立備註
            const [customNotes, setCustomNotes] = useState({});

            const [formData, setFormData] = useState({
                date: defaultDateStr,
                day: defaultFormDay,
                periods: [],
                className: '',
                subject: '',
                teacher: '',
                qty: 35,
                ta: '',
                cart: '' // 新增車號選單綁定
            });

            // --- 簡單前端混淆工具 ---
            // 將明文轉換為 16進位 字串，防止瀏覽器直接查看 index.html 時肉眼看見明文密碼
            const stringToHex = (str) => {
                return Array.from(str || '').map(c => c.charCodeAt(0).toString(16).padStart(2, '0')).join('');
            };

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            try {
                                await signInWithCustomToken(auth, __initial_auth_token);
                            } catch (tokenError) {
                                console.warn("Token 不匹配，改用匿名登入:", tokenError);
                                await signInAnonymously(auth);
                            }
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (error) {
                        console.error("驗證失敗:", error);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubscribeBookings = onSnapshot(getCollRef(), (snapshot) => {
                    const cloudData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    
                    // 修正：將週狀態存儲在 bookings 集合中，避免 Firebase 權限阻擋新集合
                    const normalBookings = cloudData.filter(doc => !String(doc.id).startsWith('week_status_'));
                    const statuses = {};
                    const halfDaysObj = {};
                    cloudData.filter(doc => String(doc.id).startsWith('week_status_')).forEach(doc => {
                        const mondayStr = String(doc.id).replace('week_status_', '');
                        statuses[mondayStr] = doc.isArranged;
                        halfDaysObj[mondayStr] = doc.halfDays || {};
                    });
                    
                    setDbBookings(normalBookings);
                    setWeekStatuses(statuses);
                    setWeekHalfDays(halfDaysObj);
                }, (error) => {
                    console.error("讀取資料失敗:", error);
                });

                return () => {
                    unsubscribeBookings();
                };
            }, [user]);

            const showNotification = (message, type = 'success') => {
                setNotification({ show: true, message, type });
                setTimeout(() => setNotification({ show: false, message: '', type: '' }), 5000); // 延長提示時間以便閱讀
            };

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                if (name === 'date') {
                    const d = new Date(value);
                    const dayIdx = d.getDay();
                    let newDay = '週末及週日(不可借用)';
                    if (dayIdx >= 1 && dayIdx <= 5) newDay = DAYS[dayIdx - 1];
                    setFormData(prev => ({ ...prev, date: value, day: newDay }));
                } else {
                    setFormData(prev => {
                        const newData = { ...prev, [name]: value };
                        // 如果選了 2-6 年級科技課，自動清空 TA 選擇
                        if ((name === 'className' || name === 'subject') && /^[2-6]/.test(newData.className) && newData.subject?.includes('科技')) {
                            newData.ta = '';
                        }
                        return newData;
                    });
                }
            };

            const handlePeriodToggle = (periodId) => {
                setFormData(prev => {
                    const periods = prev.periods.includes(periodId)
                        ? prev.periods.filter(p => p !== periodId)
                        : [...prev.periods, periodId].sort((a, b) => a - b);
                    return { ...prev, periods };
                });
            };

            // 1. 增加連堂優先安排相同車號之邏輯判定
            const planAssignments = (date, day, periods, subject, className) => {
                const dateSuffix = date.substring(5);
                if (BLACKOUT_DATES[dateSuffix]) {
                    return { success: false, message: `選擇的日期為 ${BLACKOUT_DATES[dateSuffix]}，暫停借用。` };
                }

                const isGrade2To6Tech = /^[2-6]/.test(className) && subject.includes('科技');
                let assignments = {};

                const getAvailableCarts = (pid) => {
                    if (!isAdmin && BLACKOUT_PERIODS[day] && BLACKOUT_PERIODS[day][pid]) return [];
                    const currentBookings = bookings.filter(b =>
                        !b.isSystem &&
                        b.period === pid &&
                        (b.date === date || (b.isRecurring && b.day === day))
                    );
                    const usedCarts = currentBookings.map(b => b.cart);
                    const avail = [];
                    if (!usedCarts.includes('1號車')) avail.push('1號車');
                    if (!usedCarts.includes('2號車')) avail.push('2號車');
                    return avail;
                };

                // 2-6 年級科技課獨立處理
                if (isGrade2To6Tech) {
                    for (let pid of periods) {
                        if (!isAdmin && BLACKOUT_PERIODS[day] && BLACKOUT_PERIODS[day][pid]) {
                            return { success: false, message: `第${pid}節為 ${BLACKOUT_PERIODS[day][pid]}，暫停借用。` };
                        }
                        const currentBookings = bookings.filter(b => !b.isSystem && b.period === pid && (b.date === date || (b.isRecurring && b.day === day)));
                        if (currentBookings.some(b => b.cart === '3號車')) {
                            return { success: false, message: `第${pid}節的 3號車 已被借用。` };
                        }
                        assignments[pid] = '3號車';
                    }
                    return { success: true, assignments };
                }

                // 處理普通課堂的連堂邏輯 (動態偵測連續節數)
                const sortedPeriods = [...periods].sort((a, b) => a - b);
                const blocks = [];
                let currentBlock = [];

                // 根據真實非小息節數來判斷相鄰
                const allPeriods = PERIODS.filter(p => !p.isBreak).map(p => p.id);

                for (let i = 0; i < sortedPeriods.length; i++) {
                    if (currentBlock.length === 0) {
                        currentBlock.push(sortedPeriods[i]);
                    } else {
                        const lastPeriod = currentBlock[currentBlock.length - 1];
                        const lastIdx = allPeriods.indexOf(lastPeriod);
                        const currentIdx = allPeriods.indexOf(sortedPeriods[i]);
                        // 判斷是否連續 (在非小息的陣列中 index 相差 1)
                        if (currentIdx === lastIdx + 1) {
                            currentBlock.push(sortedPeriods[i]);
                        } else {
                            blocks.push(currentBlock);
                            currentBlock = [sortedPeriods[i]];
                        }
                    }
                }
                if (currentBlock.length > 0) {
                    blocks.push(currentBlock);
                }

                let totalRearrangements = [];

                // 尋找同班在同一天已有的借用紀錄
                const existingClassBookings = bookings.filter(b => 
                    !b.isSystem && 
                    b.className === className && 
                    (b.date === date || (b.isRecurring && b.day === day))
                );

                for (let block of blocks) {
                    // 尋找該 block 的相鄰節數
                    const firstPeriod = block[0];
                    const lastPeriod = block[block.length - 1];
                    const idxFirst = allPeriods.indexOf(firstPeriod);
                    const idxLast = allPeriods.indexOf(lastPeriod);
                    
                    let forcedTargetCart = null;
                    
                    const adjacentPeriodsToCheck = [];
                    if (idxFirst > 0) adjacentPeriodsToCheck.push(allPeriods[idxFirst - 1]);
                    if (idxLast !== -1 && idxLast < allPeriods.length - 1) adjacentPeriodsToCheck.push(allPeriods[idxLast + 1]);

                    for (let adjPid of adjacentPeriodsToCheck) {
                        const adjBooking = existingClassBookings.find(b => b.period === adjPid);
                        // 只跟隨 1號 或 2號車
                        if (adjBooking && ['1號車', '2號車'].includes(adjBooking.cart)) {
                            forcedTargetCart = adjBooking.cart;
                            break;
                        }
                    }

                    // 如果找到相鄰的同班紀錄，強制使用該車號
                    if (forcedTargetCart) {
                        let canArrangeForced = true;
                        let tempRearrangements = [];
                        
                        for (let pid of block) {
                            const avail = getAvailableCarts(pid);
                            if (avail.includes(forcedTargetCart)) {
                                continue; 
                            }
                            
                            if (avail.length === 0) {
                                canArrangeForced = false; 
                                break;
                            }
                            
                            const conflictBooking = bookings.find(b =>
                                !b.isSystem &&
                                b.period === pid &&
                                b.cart === forcedTargetCart &&
                                (b.date === date || (b.isRecurring && b.day === day))
                            );

                            if (conflictBooking && !conflictBooking.isSystem) {
                                tempRearrangements.push({
                                    booking: conflictBooking,
                                    newCart: avail[0] // 換到剩下的空車
                                });
                            } else {
                                canArrangeForced = false;
                                break;
                            }
                        }
                        
                        if (canArrangeForced) {
                            for (let pid of block) {
                                assignments[pid] = forcedTargetCart;
                            }
                            totalRearrangements.push(...tempRearrangements);
                            continue; // 成功處理這個 block
                        } else {
                            return { success: false, message: `系統偵測到同班相鄰課堂有借用(${forcedTargetCart})，但無法為您排入該車號（可能因車位已滿或有固定課堂），請嘗試其他時段或分開借用。` };
                        }
                    }

                    // --- 以下為沒有相鄰同班課堂時的一般邏輯 ---
                    if (block.length > 1) { // 一般自身連堂處理
                        let commonAvail = getAvailableCarts(block[0]);
                        for (let i = 1; i < block.length; i++) {
                            const availNext = getAvailableCarts(block[i]);
                            commonAvail = commonAvail.filter(c => availNext.includes(c));
                        }

                        if (commonAvail.length > 0) {
                            for (let pid of block) {
                                assignments[pid] = commonAvail[0];
                            }
                        } else {
                            let rearranged = false;
                            const possibleCarts = ['1號車', '2號車'];

                            for (let targetCart of possibleCarts) {
                                let canRearrange = true;
                                let tempRearrangements = [];

                                for (let pid of block) {
                                    const avail = getAvailableCarts(pid);
                                    if (avail.includes(targetCart)) {
                                        continue;
                                    }

                                    if (avail.length === 0) {
                                        canRearrange = false;
                                        break;
                                    }

                                    const conflictBooking = bookings.find(b =>
                                        !b.isSystem &&
                                        b.period === pid &&
                                        b.cart === targetCart &&
                                        (b.date === date || (b.isRecurring && b.day === day))
                                    );

                                    if (conflictBooking && !conflictBooking.isSystem) {
                                        tempRearrangements.push({
                                            booking: conflictBooking,
                                            newCart: avail[0]
                                        });
                                    } else {
                                        canRearrange = false;
                                        break;
                                    }
                                }

                                if (canRearrange) {
                                    rearranged = true;
                                    for (let pid of block) {
                                        assignments[pid] = targetCart;
                                    }
                                    totalRearrangements.push(...tempRearrangements);
                                    break;
                                }
                            }

                            if (!rearranged) {
                                return { success: false, message: `無法為連堂 (第${block.join(',')}節) 安排同一部車輛，且無法自動調節，請嘗試其他時段或分開單獨預約。` };
                            }
                        }
                    } else { // 單節課處理
                        const pid = block[0];
                        const avail = getAvailableCarts(pid);
                        if (avail.length === 0) {
                            return { success: false, message: `第${pid}節的 1號及2號車 均已被借出。` };
                        }
                        assignments[pid] = avail[0];
                    }
                }

                return { success: true, assignments, rearrangements: totalRearrangements };
            };

            const executeBooking = async (data, plan) => {
                try {
                    // 如果有重排，先寫入重排的項目
                    if (plan.rearrangements && plan.rearrangements.length > 0) {
                        for (let r of plan.rearrangements) {
                            await setDoc(getDocRef(String(r.booking.id)), {
                                ...r.booking,
                                cart: r.newCart
                            }, { merge: true });
                        }
                    }

                    let newBookings = [];
                    for (let pid of data.periods) {
                        newBookings.push({
                            date: data.date,
                            day: data.day,
                            className: data.className,
                            subject: data.subject,
                            teacher: data.teacher,
                            qty: data.qty,
                            ta: data.ta,
                            period: pid,
                            cart: plan.assignments[pid],
                            isConfirmed: false
                        });
                    }

                    for (let b of newBookings) {
                        await addDoc(getCollRef(), b);
                    }
                    showNotification(`成功借用！已為您安排 ${data.periods.length} 節課堂。`);
                    setFormData(prev => ({ ...prev, className: '', subject: '', teacher: '', ta: '', cart: '', periods: [] }));
                    setRearrangeConfirm(null); // 清除確認狀態
                } catch (error) {
                    console.error("寫入資料庫失敗:", error);
                    if (error.code === 'permission-denied') {
                        showNotification('權限不足：請檢查 Firebase Firestore 規則是否允許寫入！', 'error');
                    } else {
                        showNotification(`寫入失敗：${error.message}`, 'error');
                    }
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();

                if (!user) {
                    showNotification('系統尚未完成登入，請稍後再試！', 'error');
                    return;
                }

                if (formData.day === '週末及週日(不可借用)') {
                    showNotification('週末及週日不提供借用服務，請重新選擇日期！', 'error');
                    return;
                }

                const dateSuffix = formData.date.substring(5);
                if (BLACKOUT_DATES[dateSuffix]) {
                    showNotification(`借用失敗：${formData.date} 為 ${BLACKOUT_DATES[dateSuffix]}，暫停借用服務！`, 'error');
                    return;
                }

                if (formData.periods.length === 0) {
                    showNotification('請至少選擇一節課節！', 'error');
                    return;
                }

                if (!formData.className || !formData.subject || !formData.teacher) {
                    showNotification('請填寫所有必要欄位 (班別、科目、教師代號)！', 'error');
                    return;
                }

                const getMondayStr = (offset) => {
                    const d = new Date();
                    const day = d.getDay() || 7;
                    d.setDate(d.getDate() - day + 1 + (offset * 7));
                    return getLocalYYYYMMDD(d);
                };
                const nextMondayStr = getMondayStr(1);
                const weekAfterNextMondayStr = getMondayStr(2);

                if (!isAdmin && formData.date < nextMondayStr) {
                    showNotification('一般使用者只可預約未來兩星期的課節，本星期及過去日期不設預約。', 'error');
                    return;
                }
                
                if (!isAdmin && isPastThursdayCutoff() && formData.date < weekAfterNextMondayStr) {
                    showNotification('星期四下午4時後已暫停下星期的借用安排，請預約下下週或之後的日期。', 'error');
                    return;
                }

                // 通用檢查：同一班級/同一教師是否在同一節重複借用
                for (let pid of formData.periods) {
                    const duplicateClassBooking = bookings.find(b => 
                        !b.isSystem && 
                        b.period === pid && 
                        b.className === formData.className &&
                        b.cart !== formData.cart && // 忽略自己如果選了相同車號(但其實不會發生因為還沒寫入)
                        (b.date === formData.date || (b.isRecurring && b.day === formData.day))
                    );
                    if (duplicateClassBooking) {
                        showNotification(`借用失敗：${formData.className} 班於第${pid}節已預約了 ${duplicateClassBooking.cart}，不同車號不能在同一節出現在同一班。`, 'error');
                        return;
                    }

                    const duplicateTeacherBooking = bookings.find(b => 
                        !b.isSystem && 
                        b.period === pid && 
                        b.teacher === formData.teacher &&
                        (b.date === formData.date || (b.isRecurring && b.day === formData.day))
                    );
                    if (duplicateTeacherBooking) {
                        showNotification(`借用失敗：教師 ${formData.teacher} 於第${pid}節已預約了 ${duplicateTeacherBooking.className} 班，不能在同一節重複借用。`, 'error');
                        return;
                    }
                }

                // 如果用戶有指定車號，進行強制分配與特定衝突檢查
                if (formData.cart) {

                const cartText = visibleCarts.length > 0 ? `(${visibleCarts.join(',')})` : '(無指定車號)';
                ws.mergeCells('D1:E2');
                const cartCell = ws.getCell('D1');
                cartCell.value = cartText;
                cartCell.font = { bold: true, size: 16, color: { argb: 'FF003366' } };
                cartCell.alignment = { horizontal: 'right', vertical: 'middle' };

                // 3. 處理清單資料
                let isFirstDay = true;
                weekDates.forEach(wd => {
                    const dayBookings = bookings.filter(b => 
                        !b.isSystem && 
                        ['1號車', '2號車'].includes(b.cart) &&
                        visibleCarts.includes(b.cart) && 
                        (b.date === wd.dateStr || (b.isRecurring && b.day === wd.name))
                    );

                    if (dayBookings.length === 0) return;

                    const dateRow = ws.addRow([
                        `日期：${formatDateDMY(wd.dateStr)} (${wd.name})`, '', '', '', 
                        isFirstDay ? `列印日期: ${printDateFormatted}` : ''
                    ]);
                    ws.mergeCells(`A${dateRow.number}:D${dateRow.number}`);
                    dateRow.getCell(1).font = { size: 14 };
                    dateRow.getCell(1).alignment = { horizontal: 'left' };
                    dateRow.getCell(5).alignment = { horizontal: 'right' };
                    
                    isFirstDay = false;

                    const headers = ['節數', '時間', '車號', '班別', '負責職工'];
                    const headerRow = ws.addRow(headers);
                    headerRow.eachCell((cell) => {
                        cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFCCE5FF' } };
                        cell.font = { bold: true };
                        cell.alignment = { horizontal: 'center', vertical: 'middle' };
                        cell.border = { top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'} };
                    });

                    PERIODS.forEach(period => {
                        if (period.isBreak) return;

                        const periodBookings = dayBookings.filter(b => b.period === period.id);
                        if (periodBookings.length === 0) return;

                        periodBookings.sort((a, b) => a.cart.localeCompare(b.cart));

                        periodBookings.forEach(booking => {
                            const rowColor = booking.cart === '2號車' ? 'FFE2EFDA' : 'FFFFFFFF';
                            const actualTime = weekHalfDays[currentMondayStr]?.[wd.dateStr] ? (HALF_DAY_TIMES[period.id] || period.time) : period.time;
                            const row = ws.addRow([
                                period.name, 
                                actualTime, 
                                booking.cart, 
                                booking.className, 
                                booking.workerCode || ''
                            ]);
                            row.eachCell(cell => {
                                cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: rowColor } };
                                cell.alignment = { horizontal: 'center', vertical: 'middle' };
                                cell.border = { top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'} };
                            });
                        });
                    });
                    ws.addRow([]);
                });

                const buffer = await wb.xlsx.writeBuffer();
                const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `平板電腦職工推車安排-第${weekNum}週_${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日.xlsx`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            const handlePrintOfficeFormat = () => {
                const weekDates = getWeekDates(viewDate);
                const currentMondayStr = weekDates[0].dateStr;
                const d = new Date();
                const printDateFormatted = `${d.getDate()}-${d.getMonth() + 1}-${d.getFullYear()}`;
                const weekMsg = generateCurrentWeekMsg(viewDate);

                const formatDateDMY = (dateStr) => {
                    const parts = dateStr.split('-');
                    return `${parseInt(parts[2])}-${parseInt(parts[1])}-${parts[0]}`;
                };

                let htmlContent = `
                    <!DOCTYPE html>
                    <html lang="zh-HK">
                    <head>
                        <meta charset="UTF-8">
                        <title>平板電腦職工推車安排列印</title>
                        <style>
                            /* 設定 A4 直印版面與 Margin 0 以隱藏瀏覽器預設頁首頁尾 */
                            @page { size: A4 portrait; margin: 0; }
                            body { 
                                font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
                                padding: 0 15mm; /* 只設定左右邊界 15mm */
                                -webkit-print-color-adjust: exact !important; 
                                print-color-adjust: exact !important;
                                margin: 0;
                            }
                            .main-title { color: #003366; font-size: 20px; font-weight: bold; text-decoration: underline; margin-bottom: 5px; }
                            .sub-title { font-size: 16px; margin-bottom: 20px; }
                            
                            /* 外層控制上下邊界 (15mm) 的 Table，利用 thead/tfoot 在每一頁重複的特性來模擬邊距 */
                            .page-spacing-table { width: 100%; border: none; border-collapse: collapse; }
                            .page-spacing-table > thead > tr > td, 
                            .page-spacing-table > tfoot > tr > td { height: 15mm; border: none; padding: 0; background: transparent; }
                            .page-spacing-table > tbody > tr > td { border: none; padding: 0; background: transparent; }

                            /* 內部內容表格與換頁控制 */
                            .content-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; page-break-inside: auto; }
                            .content-table tr { page-break-inside: avoid; break-inside: avoid; }
                            .content-table thead { display: table-header-group; } /* 確保表頭在換頁時自動重複 */
                            
                            .content-table th, .content-table td { border: 1px solid black; padding: 8px; text-align: center; font-size: 14px; }
                            .content-table .header-row th { background-color: #CCE5FF; font-weight: bold; border: 1px solid black; }
                            .cart-2 { background-color: #E2EFDA !important; } /* 2號車專屬綠底 */
                            
                            .date-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 5px; width: 100%; }
                            .date-text { font-size: 18px; font-weight: bold; color: black; text-align: left; }
                            .print-date { font-size: 12px; color: black; font-weight: normal; }
                        </style>
                    </head>
                    <body>
                        <table class="page-spacing-table">
                            <thead><tr><td></td></tr></thead>
                            <tbody><tr><td>
                                <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                                    <div>
                                        <div class="main-title">觀塘官立小學(秀明道)</div>
                                        <div class="sub-title">平板電腦職工推車安排 (${weekMsg})</div>
                                    </div>
                                    <div style="font-size: 20px; font-weight: bold; color: #003366; text-align: right; margin-top: 2px;">
                                        ${visibleCarts.length > 0 ? `(${visibleCarts.join(',')})` : '(無指定車號)'}
                                    </div>
                                </div>
                `;

                let isFirstDay = true;
                weekDates.forEach(wd => {
                    const dayBookings = bookings.filter(b => 
                        !b.isSystem && 
                        ['1號車', '2號車'].includes(b.cart) &&
                        visibleCarts.includes(b.cart) && 
                        (b.date === wd.dateStr || (b.isRecurring && b.day === wd.name))
                    );

                    if (dayBookings.length === 0) return;

                    // 將日期標題放入 thead 內，當表格跨頁時，整個 thead (包含日期) 都會在下一頁頂部重複印出
                    htmlContent += `
                        <table class="content-table">
                            <thead>
                                <tr>
                                    <th colspan="5" style="border: none; background: transparent; padding: 0 0 5px 0;">
                                        <div class="date-header">
                                            <div class="date-text">日期：${formatDateDMY(wd.dateStr)} (${wd.name})</div>
                                            <div class="print-date">${isFirstDay ? `列印日期: ${printDateFormatted}` : ''}</div>
                                        </div>
                                    </th>
                                </tr>
                                <tr class="header-row">
                                    <th style="width: 15%;">節數</th>
                                    <th style="width: 25%;">時間</th>
                                    <th style="width: 15%;">車號</th>
                                    <th style="width: 20%;">班別</th>
                                    <th style="width: 25%;">負責職工</th>
                                </tr>
                            </thead>
                            <tbody>
                    `;
                    isFirstDay = false;

                    PERIODS.forEach(period => {
                        if (period.isBreak) return;
                        const periodBookings = dayBookings.filter(b => b.period === period.id);
                        if (periodBookings.length === 0) return;

                        periodBookings.sort((a, b) => a.cart.localeCompare(b.cart));

                        periodBookings.forEach(booking => {
                            const rowClass = booking.cart === '2號車' ? 'cart-2' : '';
                            const actualTime = weekHalfDays[currentMondayStr]?.[wd.dateStr] ? (HALF_DAY_TIMES[period.id] || period.time) : period.time;
                            htmlContent += `
                                <tr class="${rowClass}">
                                    <td>${period.name}</td>
                                    <td>${actualTime}</td>
                                    <td>${booking.cart}</td>
                                    <td>${booking.className}</td>
                                    <td>${booking.workerCode || ''}</td>
                                </tr>
                            `;
                        });
                    });

                    htmlContent += `
                            </tbody>
                        </table>
                    `;
                });

                htmlContent += `
                            </td></tr></tbody>
                            <tfoot><tr><td></td></tr></tfoot>
                        </table>
                    </body>
                    </html>
                `;

                const printWindow = window.open('', '_blank');
                if (printWindow) {
                    printWindow.document.open();
                    printWindow.document.write(htmlContent);
                    printWindow.document.close();
                    
                    printWindow.onload = function() {
                        printWindow.setTimeout(function() {
                            printWindow.print();
                        }, 300);
                    };
                } else {
                    showNotification('無法開啟列印視窗，請確認瀏覽器是否允許彈出視窗 (Pop-ups)。', 'error');
                }
            };

            const handleLogin = (e) => {
                e.preventDefault();
                const inputHex = stringToHex(loginPassword);
                
                if (inputHex === '536d722d3132333435') {
                    setLoginRole('user');
                    setIsAdmin(false);
                    sessionStorage.setItem('loginRole', 'user');
                    sessionStorage.setItem('isAdmin', 'false');
                    
                    const defaultDate = getUserDefaultDate();
                    const dObj = new Date(defaultDate);
                    const dIdx = dObj.getDay();
                    const defaultDay = (dIdx === 0 || dIdx === 6) ? '週末及週日(不可借用)' : DAYS[dIdx - 1];
                    
                    setFormData({
                        date: defaultDate,
                        day: defaultDay,
                        periods: [],
                        className: '',
                        subject: '',
                        teacher: '',
                        qty: 35,
                        ta: '',
                        cart: ''
                    });
                    
                    showNotification('登入成功！一般使用者模式');
                } else if (inputHex === '536d722d32353236') {
                    setLoginRole('admin');
                    setIsAdmin(true);
                    sessionStorage.setItem('loginRole', 'admin');
                    sessionStorage.setItem('isAdmin', 'true');
                    
                    const defaultDate = getAdminDefaultDate();
                    const dObj = new Date(defaultDate);
                    const dIdx = dObj.getDay();
                    const defaultDay = (dIdx === 0 || dIdx === 6) ? '週末及週日(不可借用)' : DAYS[dIdx - 1];
                    
                    setFormData({
                        date: defaultDate,
                        day: defaultDay,
                        periods: [],
                        className: '',
                        subject: '',
                        teacher: '',
                        qty: 35,
                        ta: '',
                        cart: ''
                    });
                    
                    showNotification('登入成功！系統管理員模式');
                } else if (inputHex === '536d722d32363038') {
                    setLoginRole('office');
                    setIsAdmin(false);
                    sessionStorage.setItem('loginRole', 'office');
                    sessionStorage.setItem('isAdmin', 'false');
                    setActiveTab('schedule');
                    showNotification('登入成功！校務處模式');
                } else {
                    showNotification('密碼錯誤！', 'error');
                }
                setLoginPassword('');
            };

            const handleLogout = () => {
                setLoginRole(null);
                setIsAdmin(false);
                sessionStorage.removeItem('loginRole');
                sessionStorage.removeItem('isAdmin');
                setLoginPassword('');
                setActiveTab('form');
                showNotification('已登出系統');
            };

            const getWeekDates = (dateStr) => {
                const d = new Date(dateStr || new Date());
                const day = d.getDay() || 7;
                const monday = new Date(d);
                monday.setDate(d.getDate() - day + 1);

                return DAYS.map((name, i) => {
                    const curr = new Date(monday);
                    curr.setDate(monday.getDate() + i);
                    return {
                        name,
                        dateStr: getLocalYYYYMMDD(curr),
                        display: `${curr.getMonth() + 1}月${curr.getDate()}日`
                    };
                });
            };

            const renderBookingCard = (booking, themeStyles, viewOnly = false) => {
                const isGrade1Tech = /^[1][A-E]/.test(booking.className) && booking.subject?.includes('科技');
                const isSystemFixed = (booking.isRecurring || (booking.cart === '3號車' && booking.subject?.includes('科技'))) && !isGrade1Tech;
                const isLocked = isSystemFixed || (booking.isConfirmed && !isAdmin);
                const isDraggable = !isSystemFixed && (!booking.isConfirmed || isAdmin) && !viewOnly;

                return (
                    <div
                        key={booking.id}
                        draggable={isDraggable}
                        onDragStart={(e) => { if (isDraggable) e.dataTransfer.setData('bookingId', booking.id); }}
                        // 使用固定高度的百分比 (h-full) 來繼承外層 td 指定的高度
                        className={`p-1.5 sm:p-2 rounded border relative w-full h-full flex flex-col justify-between ${isDraggable ? 'group cursor-move hover:shadow-md cursor-pointer' : 'opacity-95'} shadow-sm transition-shadow ${themeStyles.bg} ${themeStyles.border}`}
                        title={viewOnly ? "" : (isSystemFixed ? "固定課堂，不可調動或修改" : (booking.isConfirmed ? "點擊解除確認(需輸入管理員密碼)" : "老師/管理員：可按住拖曳以調動，或點擊編輯修改內容"))}
                    >
                        {isDraggable && (
                        <div className="absolute -top-2 -right-2 opacity-0 group-hover:opacity-100 bg-gray-800 text-white p-1 rounded-full pointer-events-none transition-opacity z-20">
                            <GripVertical size={12} />
                        </div>
                        )}

                        <div className="w-full flex-1 flex flex-col min-h-0">
                            <div className="flex justify-between items-start mb-0.5 w-full gap-1">
                                <div className="font-bold text-[11px] sm:text-sm text-gray-800 leading-tight whitespace-normal break-words flex-1 min-w-0">
                                {booking.className} {booking.subject}({booking.teacher})
                                </div>
                                
                                <div className="flex items-center flex-shrink-0">
                                    {!viewOnly && !isSystemFixed && !booking.isConfirmed && (
                                        <span onClick={(e) => { e.stopPropagation(); confirmBooking(booking.id); }} className="cursor-pointer text-blue-700 bg-blue-100 hover:bg-blue-200 px-1 py-0.5 rounded text-[10px] font-bold transition-all z-10 whitespace-nowrap">確認</span>
                                    )}
                                    {!viewOnly && !isSystemFixed && booking.isConfirmed && (
                                        <span
                                            onClick={(e) => {
                                            e.stopPropagation();
                                            if (isAdmin) {
                                                if (!user) { showNotification('尚未登入', 'error'); return; }
                                                setDoc(getDocRef(String(booking.id)), { ...booking, isConfirmed: false }, { merge: true })
                                                .then(() => showNotification('已解除確認，現在可作修改。', 'success'))
                                                .catch((error) => showNotification(`解除確認失敗：${error.message}`, 'error'));
                                            } else {
                                                setUnlockTargetId(booking.id);
                                            }
                                            }}
                                            className="text-green-600 font-bold text-[10px] cursor-pointer hover:underline z-10 whitespace-nowrap"
                                            title="點擊解除確認(需輸入管理員密碼)"
                                        >
                                            已確認
                                        </span>
                                    )}
                                    {!viewOnly && isSystemFixed && (
                                        <span className="text-[10px] font-bold text-purple-700 bg-purple-100 px-1 rounded whitespace-nowrap">固定</span>
                                    )}
                                    {viewOnly && (booking.isConfirmed || isSystemFixed) && (
                                        <span className={`text-[10px] font-bold px-1 rounded whitespace-nowrap ${isSystemFixed ? 'text-purple-700 bg-purple-100' : 'text-green-600'}`}>
                                            {isSystemFixed ? '固定' : '已確認'}
                                        </span>
                                    )}
                                </div>
                            </div>

                            <div className="text-[10px] sm:text-xs text-gray-600 leading-tight whitespace-normal break-words mt-0.5 mb-0.5 w-full flex-1 min-w-0">
                                {booking.subject?.includes('科技') && /^[2-6]/.test(booking.className)
                                    ? `科任老師: ${booking.teacher}`
                                    : (booking.ta === '科任老師' ? `科任老師: ${booking.teacher}` : (booking.ta === 'Issac' || booking.ta === 'Ming' ? `ITRO: ${booking.ta}` : (booking.ta === 'Stephanie' ? `ITRA: ${booking.ta}` : `TA: ${booking.ta || ''}`)))}
                            </div>
                        </div>

                        <div className="flex justify-between items-end mt-1 w-full gap-1">
                            <div className="text-[10px] font-bold flex items-center text-gray-500 flex-shrink-0 min-w-0">
                                <Truck size={10} className="mr-0.5 flex-shrink-0" /> <span className="truncate">{booking.cart}</span>
                            </div>
                            {!viewOnly && !isSystemFixed && !booking.isConfirmed && (
                                <div className="flex items-center space-x-1 flex-shrink-0">
                                    <span onClick={(e) => { e.stopPropagation(); setEditTargetBooking(booking); }} className="cursor-pointer opacity-100 lg:opacity-0 group-hover:opacity-100 text-green-700 bg-green-100 hover:bg-green-200 px-1 py-0.5 rounded text-[10px] font-bold transition-all z-10 whitespace-nowrap">編輯</span>
                                    <span onClick={(e) => { e.stopPropagation(); setDeleteConfirmId(booking.id); }} className="cursor-pointer opacity-100 lg:opacity-0 group-hover:opacity-100 text-red-600 bg-red-100 hover:bg-red-200 px-1 py-0.5 rounded text-[10px] font-bold transition-all z-10 whitespace-nowrap">刪除</span>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            const renderDateSelector = () => {
                const thisWeek = getDateStrFromMonday(0);
                const nextWeek = getDateStrFromMonday(7);
                const weekAfterNext = getDateStrFromMonday(14);

                return (
                    <div className="mb-6 flex flex-col sm:flex-row items-start sm:items-center bg-white p-3 rounded-lg border border-gray-200 shadow-sm gap-2 w-full sm:w-max print-hide">
                        <div className="flex items-center">
                        <Calendar className="mr-2 text-blue-600 flex-shrink-0" size={20} />
                        <label className="text-sm font-medium text-gray-700 mr-2 whitespace-nowrap">選擇檢視週次：</label>
                        </div>
                        <select
                        value={viewDate}
                        onChange={e => setViewDate(e.target.value)}
                        className="w-full sm:w-auto p-1.5 border rounded-md text-sm outline-none focus:ring-2 focus:ring-blue-500 text-gray-800 font-medium bg-gray-50 cursor-pointer"
                        >
                        <option value={thisWeek}>本週 - {generateCurrentWeekMsg(thisWeek)}</option>
                        <option value={nextWeek}>下週 - {generateCurrentWeekMsg(nextWeek)}</option>
                        <option value={weekAfterNext}>下下週 - {generateCurrentWeekMsg(weekAfterNext)}</option>
                        </select>
                        <span className="text-xs text-gray-500 block sm:inline whitespace-normal sm:whitespace-nowrap mt-1 sm:mt-0">(可預約未來兩星期的課室平板電腦)</span>
                    </div>
                );
            };

            const renderForm = () => {
                let availabilityMsg = "";
                let isFull = false;
                
                const getMondayStr = (offset) => {
                    const d = new Date();
                    const day = d.getDay() || 7;
                    d.setDate(d.getDate() - day + 1 + (offset * 7));
                    return getLocalYYYYMMDD(d);
                };
                const nextMondayStr = getMondayStr(1);
                const weekAfterNextMondayStr = getMondayStr(2);
                
                const dateSuffix = formData.date.substring(5);

                if (formData.day === '週末及週日(不可借用)') {
                    availabilityMsg = "週末及週日不提供借用服務，請選擇星期一至星期五的日期。";
                    isFull = true;
                } else if (BLACKOUT_DATES[dateSuffix]) {
                    availabilityMsg = `系統提示：${formData.date} 為 ${BLACKOUT_DATES[dateSuffix]}，暫停借用服務。`;
                    isFull = true;
                } else if (formData.periods.length === 0) {
                    availabilityMsg = "請點選欲借用的課節。";
                } else {
                    if (!isAdmin && formData.date < nextMondayStr) {
                        availabilityMsg = "系統提示：一般使用者只可預約未來兩星期的課節，本星期及過去日期不設預約。";
                        isFull = true;
                    } else if (!isAdmin && isPastThursdayCutoff() && formData.date < weekAfterNextMondayStr) {
                        availabilityMsg = "系統提示：星期四下午4時後已暫停下星期的借用安排，請預約可預約週次的日期。";
                        isFull = true;
                    } else if (formData.cart) {
                        availabilityMsg = `您已指定使用 ${formData.cart}，系統將為您安排該車號。`;
                    } else {
                        const plan = planAssignments(formData.date, formData.day, formData.periods, formData.subject, formData.className);
                        if (!plan.success) {
                            availabilityMsg = `注意：${plan.message}`;
                            isFull = true;
                        } else {
                            const isGrade2To6Tech = /^[2-6]/.test(formData.className) && formData.subject.includes('科技');
                            if (isGrade2To6Tech) {
                                availabilityMsg = `目前選取的 ${formData.periods.length} 節課 3號車 尚可借用。`;
                            } else if (plan.rearrangements && plan.rearrangements.length > 0) {
                                availabilityMsg = `系統偵測可自動調節車號，將安排同車連堂給您 (需確認)。`;
                            } else {
                                let cart1Free = true;
                                let cart2Free = true;
                                for (let pid of formData.periods) {
                                    const currentBookings = bookings.filter(b =>
                                        !b.isSystem &&
                                        b.period === pid &&
                                        (b.date === formData.date || (b.isRecurring && b.day === formData.day))
                                    );
                                    const usedCarts = currentBookings.map(b => b.cart);
                                    if (usedCarts.includes('1號車')) cart1Free = false;
                                    if (usedCarts.includes('2號車')) cart2Free = false;
                                }

                                let idleMsg = "";
                                if (cart1Free && cart2Free) {
                                    idleMsg = "1號及2號車皆閒置可借用";
                                } else if (cart1Free) {
                                    idleMsg = "1號車閒置可借用,2號車已借出";
                                } else if (cart2Free) {
                                    idleMsg = "2號車閒置可借用,1號車已借出";
                                } else {
                                    idleMsg = "將由系統混合安排1號及2號車";
                                }

                                availabilityMsg = (
                                    <span>
                                        目前選取的{formData.periods.length}節課,{idleMsg}. 
                                        <span className="block sm:inline">(若有連堂安排,系統會盡量安排同車)</span>
                                    </span>
                                );
                            }
                        }
                    }
                }

                // 判斷是否為 2-6年級科技課
                const isGrade2To6TechForm = /^[2-6]/.test(formData.className) && formData.subject?.includes('科技');

                const getMondayStrOfDate = (dateStr) => {
                    const d = new Date(dateStr);
                    const day = d.getDay() || 7;
                    const monday = new Date(d);
                    monday.setDate(d.getDate() - day + 1);
                    return getLocalYYYYMMDD(monday);
                };
                const currentSelectedMondayStr = getMondayStrOfDate(formData.date);
                const isSelectedDateHalfDay = weekHalfDays[currentSelectedMondayStr]?.[formData.date] || false;

                return (
                <div className="w-full md:max-w-4xl lg:max-w-5xl mx-auto bg-white p-6 md:p-10 rounded-xl shadow-sm border border-gray-100">
                    <div className="mb-6 md:mb-8 pb-4 border-b">
                        <h2 className="text-xl md:text-2xl font-bold text-gray-800 flex flex-col sm:flex-row items-start sm:items-center">
                            <div className="flex items-center">
                                <MonitorSmartphone className="text-blue-600 w-6 h-6 md:w-8 md:h-8 mr-2 md:mr-3 flex-shrink-0" />
                                <span>平板電腦借用申請</span>
                            </div>
                        </h2>
                        <div className="block sm:inline-block bg-blue-50 text-blue-800 px-3.5 py-2 rounded-md text-sm font-semibold border border-blue-100 shadow-sm mt-3 overflow-x-auto w-full sm:w-auto">
                            {generateBookingRangeMsg()}
                        </div>
                    </div>

                    <form onSubmit={handleSubmit} className="space-y-5 md:space-y-8">
                    <div className="flex flex-col sm:flex-row gap-3 sm:gap-4 md:gap-8 w-full">
                        <div className="w-full sm:flex-1 min-w-0 space-y-1.5 md:space-y-2">
                        <label className="text-sm md:text-base font-medium text-gray-700 whitespace-nowrap">
                            借用日期
                            {isSelectedDateHalfDay && <span className="text-red-600 font-bold ml-1 md:ml-2">(半日上課)</span>}
                        </label>
                        <input type="date" name="date" value={formData.date} onChange={handleInputChange} className="w-full min-w-full appearance-none px-2 sm:px-2.5 py-2 sm:p-2.5 md:p-3.5 text-sm sm:text-base md:text-lg border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none box-border block bg-white" required />
                        </div>
                        <div className="w-full sm:flex-1 min-w-0 space-y-1.5 md:space-y-2">
                        <label className="text-sm md:text-base font-medium text-gray-700 whitespace-nowrap">星期</label>
                        <input type="text" name="day" value={formData.day} readOnly className="w-full min-w-full appearance-none px-2 sm:px-2.5 py-2 sm:p-2.5 md:p-3.5 text-sm sm:text-base md:text-lg border rounded-lg bg-gray-50 text-gray-500 outline-none cursor-not-allowed text-ellipsis whitespace-nowrap overflow-hidden box-border block" />
                        </div>
                    </div>

                    <div className="space-y-2 md:space-y-3">
                        <label className="text-sm md:text-base font-medium text-gray-700 block">
                        課節 <span className="text-blue-600 text-xs md:text-sm ml-1">(若連堂借用，教師可多選連堂節數)</span>
                        </label>
                        {/* 修正按鈕為純網格配置，統一寬度 */}
                        <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-2 md:gap-3">
                        {PERIODS.filter(p => !p.isBreak).map(p => (
                            <button
                            key={p.id}
                            type="button"
                            onClick={() => handlePeriodToggle(p.id)}
                            className={`w-full py-2.5 rounded-lg border text-sm md:text-base font-medium transition-colors flex justify-center items-center ${formData.periods.includes(p.id)
                                ? 'bg-blue-600 text-white border-blue-600 shadow-sm'
                                : 'bg-white text-gray-600 border-gray-200 hover:bg-gray-50'
                                }`}
                            >
                            {p.name}
                            </button>
                        ))}
                        </div>
                    </div>

                    <div className="-mt-1 mb-2 md:mb-4 md:text-lg">
                        {isFull ? (
                        <div className="text-red-500 text-sm md:text-base flex items-start sm:items-center font-medium"><Info size={14} className="mr-1 mt-0.5 sm:mt-0 md:w-5 md:h-5 flex-shrink-0" /> <div>{availabilityMsg}</div></div>
                        ) : (
                        <div className="text-green-600 text-sm md:text-base flex items-start sm:items-center font-medium"><Info size={14} className="mr-1 mt-0.5 sm:mt-0 md:w-5 md:h-5 flex-shrink-0" /> <div>{availabilityMsg}</div></div>
                        )}
                    </div>

                    <div className="grid grid-cols-3 gap-4 md:gap-8 border-t pt-4 md:pt-8">
                        <div className="space-y-1.5 md:space-y-2">
                        <label className="text-sm md:text-base font-medium text-gray-700">班別</label>
                        <select name="className" value={formData.className} onChange={handleInputChange} className="w-full p-2.5 md:p-3.5 md:text-lg border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                            <option value="" disabled>選擇班別</option>
                            {CLASSES.map(c => <option key={c} value={c}>{c}</option>)}
                        </select>
                        </div>
                        <div className="space-y-1.5 md:space-y-2">
                        <label className="text-sm md:text-base font-medium text-gray-700">科目</label>
                        <select name="subject" value={formData.subject} onChange={handleInputChange} className="w-full p-2.5 md:p-3.5 md:text-lg border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                            <option value="" disabled>選擇科目</option>
                            {SUBJECTS.map(s => <option key={s} value={s}>{s}</option>)}
                        </select>
                        </div>
                        <div className="space-y-1.5 md:space-y-2">
                        <label className="text-sm md:text-base font-medium text-gray-700">教師代號</label>
                        <select name="teacher" value={formData.teacher} onChange={handleInputChange} className="w-full p-2.5 md:p-3.5 md:text-lg border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                            <option value="" disabled>選擇教師</option>
                            {TEACHERS.map(t => <option key={t} value={t}>{t}</option>)}
                        </select>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 md:gap-8 mt-4 md:mt-6">
                        <div className="space-y-1.5 md:space-y-2">
                        <label className="text-sm md:text-base font-medium text-gray-700">車號 (選填)</label>
                        <select name="cart" value={formData.cart} onChange={handleInputChange} className="w-full p-2.5 md:p-3.5 md:text-lg border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                            <option value="">自動分配</option>
                            <option value="1號車">1號車</option>
                            <option value="2號車">2號車</option>
                            <option value="3號車">3號車</option>
                        </select>
                        </div>
                        <div className="space-y-1.5 md:space-y-2">
                        <label className="text-sm md:text-base font-medium text-gray-700">需要數量 (部)</label>
                        <input type="number" name="qty" value={formData.qty} onChange={handleInputChange} min="1" max="40" className="w-full p-2.5 md:p-3.5 md:text-lg border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                        </div>
                        <div className="space-y-1.5 md:space-y-2">
                        <label className="text-sm md:text-base font-medium text-gray-700">負責TA (選填)</label>
                        <select name="ta" value={formData.ta} onChange={handleInputChange} disabled={isGrade2To6TechForm} className={`w-full p-2.5 md:p-3.5 md:text-lg border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none ${isGrade2To6TechForm ? 'bg-gray-100 cursor-not-allowed' : 'bg-white'}`}>
                            <option value="">選擇TA (選填)</option>
                            {TAS.map(ta => <option key={ta} value={ta}>{ta}</option>)}
                        </select>
                        </div>
                    </div>

                    <div className="bg-blue-50 p-4 md:p-6 rounded-lg flex items-start space-x-3 text-sm md:text-base text-blue-800 mt-6">
                        <div>
                        <p className="font-semibold mb-2">借用平板電腦的注意事項：</p>
                        <ol className="list-decimal pl-4 space-y-1 opacity-90">
                            <li>設定管理員可刪除或調動教師已設定借用的課堂(以方塊的形式移動借用課節位置)</li>
                            <li>教師可檢視及預約借用未來兩星期的課室平板電腦.每星期四下午4時會截數.</li>
                            <li>教師只可瀏覽本星期借用情況,並不設借用.(因已作安排)</li>
                            <li>供一至四年級課室借出的平板電腦為 1, 2號車。</li>
                            <li>系統會自動為「2-6年級科技課」指派 3號車,暫不安排借出給其他課堂使用。</li>
                            <li>如借用節數已被安排，系統會檢視並提示其他車號(1,2號)能否借用。</li>
                            <li>「綜合課」、「生教課」、「課外活動」為特別課堂，暫不開放借用。</li>
                            <li>如特別活動急需使用平板電腦進行活動,請與「資訊科技及數字教育組」聯絡,本組因應情況盡量安排.</li>
                        </ol>
                        </div>
                    </div>

                    <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 md:py-4 rounded-lg md:text-xl transition-colors flex justify-center items-center space-x-2 mt-6">
                        <CheckCircle2 className="w-5 h-5 md:w-6 md:h-6 mr-2" />
                        <span>提交借用申請</span>
                    </button>
                    </form>
                </div>
                );
            };

            const renderCartRecords = (cartLabel, locationText, themeStyles) => {
                const weekDates = getWeekDates(viewDate);

                return (
                <div className={`mb-8 bg-white p-4 rounded-xl shadow-sm border ${themeStyles.border}`}>
                    <h3 className={`text-lg font-bold flex flex-col sm:flex-row sm:items-center mb-4 ${themeStyles.text}`}>
                    <div className="flex items-center">
                        <Truck className="mr-2" size={20} />
                        <span>{cartLabel} 借用紀錄表{locationText}</span>
                    </div>
                    <span className="text-sm font-bold text-black sm:ml-2 mt-1 sm:mt-0">
                        ({generateCurrentWeekMsg(viewDate)})
                    </span>
                    </h3>
                    <div className="overflow-x-auto w-full pb-4">
                        <table className="w-full border-collapse border border-black min-w-[900px] md:min-w-[1200px] xl:min-w-full table-fixed">
                            <thead>
                            <tr>
                                <th className="border border-black p-1 sm:p-2 bg-blue-100 text-center w-[120px] sm:w-36 min-w-[120px] sm:min-w-[9rem] text-sm sm:text-lg text-blue-900 shadow-sm font-extrabold whitespace-nowrap align-middle">
                                節數/時間
                                </th>
                                {weekDates.map(wd => (
                                <th key={wd.name} className="border border-black p-1 sm:p-2 bg-blue-100 text-center text-blue-900 align-middle w-[16%]">
                                    <div className="flex flex-col justify-center items-center w-full">
                                        <div className="w-full font-extrabold text-[13px] sm:text-lg text-center">{wd.display}</div>
                                        <div className="w-full font-bold text-[12px] sm:text-base text-center">{wd.name}</div>
                                    </div>
                                </th>
                                ))}
                            </tr>
                            </thead>
                            <tbody>
                            {PERIODS.map(period => {
                                if (period.isBreak) {
                                    const isBlackBold = ['小息', '小休', '午膳', '午息'].includes(period.name);
                                    return (
                                        <tr key={period.id} className="bg-gray-50">
                                        <td className={`border border-black p-2 text-center ${isBlackBold ? 'text-black font-extrabold text-base sm:text-lg' : 'text-gray-700 font-bold text-sm sm:text-base'}`} colSpan={6}>
                                            {period.name} ({period.time})
                                        </td>
                                        </tr>
                                    );
                                }
                                return (
                                <tr key={period.id}>
                                    {/* 加入固定高度 (h-[95px] sm:h-[105px])，確保單元格方塊大小一致 */}
                                    <td className="border border-black p-1 sm:p-2 bg-gray-200 text-center align-middle w-[120px] sm:w-36 min-w-[120px] sm:min-w-[9rem] h-[95px] sm:h-[105px]">
                                    <div className="font-extrabold text-base sm:text-lg mb-1 text-gray-900 whitespace-nowrap">{period.name}</div>
                                    <div className="font-bold text-sm sm:text-base text-gray-800 whitespace-nowrap">
                                        <span>{period.time}</span>
                                    </div>
                                    </td>
                                    {weekDates.map(wd => {
                                    const cellBookings = bookings.filter(b =>
                                        (b.isSystem && b.day === wd.name && b.period === period.id) ||
                                        (b.isRecurring && b.day === wd.name && b.period === period.id) ||
                                        (!b.isSystem && !b.isRecurring && b.date === wd.dateStr && b.period === period.id)
                                    );
                                    
                                    const dateSuffix = wd.dateStr.substring(5);
                                    const isDateBlackout = BLACKOUT_DATES[dateSuffix];
                                    const isSystemBlackout = cellBookings.some(b => b.isSystem);
                                    const booking = cellBookings.find(b => !b.isSystem && b.cart === cartLabel);

                                    if (isDateBlackout || (isSystemBlackout && !isAdmin && !booking)) {
                                        const remark = isDateBlackout || cellBookings.find(b => b.isSystem).remark;
                                        return (
                                        <td key={`${wd.name}-${period.id}`} className="border border-black p-1 sm:p-2 align-middle text-center bg-[#f5f5dc] h-[95px] sm:h-[105px]">
                                            <span className="text-black font-extrabold text-[15px]">{remark}</span>
                                        </td>
                                        );
                                    }

                                    return (
                                        <td
                                        key={`${wd.name}-${period.id}`}
                                        // 同樣加上固定高度以確保與其餘欄位對齊
                                        className={`border border-black p-1 sm:p-2 align-middle transition-colors h-[95px] sm:h-[105px] ${isSystemBlackout ? 'bg-[#f5f5dc]' : ''} hover:bg-gray-50`}
                                        onDragOver={(e) => { if (isAdmin || !isSystemBlackout) e.preventDefault(); }}
                                        onDrop={(e) => handleDrop(e, wd.dateStr, period.id, wd.name, cartLabel)}
                                        >
                                        <div className="h-full w-full flex items-center justify-center">
                                            {booking ? renderBookingCard(booking, themeStyles) : (
                                                <div className={`h-full w-full flex items-center justify-center border-2 border-transparent hover:border-dashed hover:border-gray-400 rounded transition-all text-center ${isSystemBlackout ? 'text-black' : 'text-transparent hover:text-gray-500 text-xs font-bold'}`}>
                                                {isSystemBlackout ? (
                                                    <span className="font-extrabold text-[15px]">{cellBookings.find(b => b.isSystem).remark}</span>
                                                ) : '可拖曳至此'}
                                                </div>
                                            )}
                                        </div>
                                        </td>
                                    );
                                    })}
                                </tr>
                                )
                            })}
                            </tbody>
                        </table>
                    </div>
                </div>
                );
            };

            const renderRecords = () => (
                <div className="space-y-2 w-full max-w-full overflow-hidden">
                <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 mb-4 relative">
                    <h2 className="text-xl font-bold text-gray-800 flex flex-row items-center flex-wrap">
                    <div className="flex items-center">
                        <List className="mr-2 text-blue-600 flex-shrink-0" size={24} />
                        <span>借用紀錄清單</span>
                    </div>
                    <span className="text-base text-gray-600 ml-2">(按車號分配)</span>
                    </h2>

                    <div className="block sm:inline-block bg-blue-50 text-blue-800 px-3.5 py-2 rounded-md text-sm font-semibold border border-blue-100 shadow-sm mt-3 overflow-x-auto w-full sm:w-auto">
                    {generateBookingRangeMsg()}
                    </div>
                </div>

                {renderDateSelector()}
                {renderCartRecords('1號車', '(課室)', { border: 'border-blue-100', text: 'text-blue-700', bg: 'bg-blue-50 border-blue-200' })}
                {renderCartRecords('2號車', '(課室)', { border: 'border-green-100', text: 'text-green-700', bg: 'bg-green-50 border-green-200' })}
                {renderCartRecords('3號車', '(電腦室)', { border: 'border-purple-100', text: 'text-purple-700', bg: 'bg-purple-50 border-purple-200' })}
                </div>
            );

            const renderSchedule = (mode = 'normal') => {
                const weekDates = getWeekDates(viewDate);
                const currentMondayStr = weekDates[0].dateStr;
                const isWeekArranged = weekStatuses[currentMondayStr] || false;

                let titleText = "每週平板電腦(iPad) 借用總表";
                if (mode === 'duty') titleText = "安排職務總表(校務處)";
                if (mode === 'office') titleText = "每週平板電腦運送安排總表";

                // 2. 簡化版的顯示資訊卡片
                const renderSimplifiedScheduleCard = (booking) => {
                    let themeStyles = { bg: "bg-gray-100", border: "border-gray-200", text: "text-gray-800", actionText: "text-gray-600" };
                    if (booking.cart === '1號車') themeStyles = { bg: "bg-blue-50", border: "border-blue-300", text: "text-blue-900", actionText: "text-blue-700" };
                    if (booking.cart === '2號車') themeStyles = { bg: "bg-green-50", border: "border-green-300", text: "text-green-900", actionText: "text-green-700" };
                    if (booking.cart === '3號車') themeStyles = { bg: "bg-purple-50", border: "border-purple-300", text: "text-purple-900", actionText: "text-purple-700" };

                    // 針對「安排職務總表」與「校務處總表」的專屬佈局格式
                    if (mode === 'duty' || mode === 'office') {
                        const isComputerRoomFixed = /^[2-6]/.test(booking.className) && booking.subject?.includes('科技');
                        return (
                            <div key={booking.id} className={`p-1.5 sm:p-2 rounded-lg border w-full flex shadow-sm h-[70px] mb-1 overflow-hidden ${themeStyles.bg} ${themeStyles.border} ${themeStyles.text}`}>
                                {/* 左半邊 */}
                                <div className="flex flex-col justify-between flex-1 pr-1 overflow-hidden">
                                    {/* 上方約2/3: 班別 (放大粗體) 及 編輯 */}
                                    <div className="flex items-center space-x-1.5 overflow-hidden">
                                        <div className="font-black text-2xl sm:text-3xl leading-none tracking-tight truncate">
                                            {booking.className}
                                        </div>
                                        {mode === 'duty' && !isComputerRoomFixed && (
                                            <span onClick={(e) => { e.stopPropagation(); setAssignWorkerTarget(booking); }} className="cursor-pointer text-blue-700 bg-blue-100 hover:bg-blue-200 px-1.5 py-0.5 rounded-sm text-[11px] font-bold transition-colors z-10 whitespace-nowrap flex-shrink-0">
                                                編輯
                                            </span>
                                        )}
                                    </div>
                                    {/* 下方約1/3: 車號 */}
                                    <div className="flex items-center mt-auto pt-1">
                                        <div className="text-[12px] sm:text-[14px] font-black flex items-center whitespace-nowrap">
                                            <Truck size={12} className="mr-0.5" /> {booking.cart.replace('號車', '')}
                                        </div>
                                    </div>
                                </div>
                                {/* 右半邊: 職工代號 / 電腦室 */}
                                <div className="w-[45px] sm:w-[56px] flex-shrink-0 flex items-center justify-center border-l border-gray-300 border-opacity-40 pl-1 overflow-hidden">
                                    {booking.workerCode ? (
                                        <span className="font-black text-3xl sm:text-[40px] text-center leading-none">
                                            {booking.workerCode}
                                        </span>
                                    ) : (
                                        <div className="relative flex items-center justify-center w-full">
                                            {/* 隱藏的佔位符，用來撐開與職工代號相同的高度，確保表格方塊大小一致 */}
                                            <span className="font-black text-3xl sm:text-[40px] text-center leading-none opacity-0 select-none pointer-events-none">
                                                培
                                            </span>
                                            <span className="absolute font-bold text-[11px] sm:text-[13px] text-center text-gray-500 whitespace-nowrap tracking-tighter">
                                                {isComputerRoomFixed ? "電腦室" : "未指派"}
                                            </span>
                                        </div>
                                    )}
                                </div>
                            </div>
                        );
                    }

                    let secondLine = '';
                    const isGrade2To6Tech = booking.subject?.includes('科技') && /^[2-6]/.test(booking.className);

                    if (isGrade2To6Tech) {
                        secondLine = `科任老師: ${booking.teacher}`;
                    } else {
                        if (booking.ta === '科任老師') {
                            secondLine = `科任老師: ${booking.teacher}`;
                        } else if (booking.ta === 'Issac' || booking.ta === 'Ming') {
                            secondLine = `ITRO: ${booking.ta}`;
                        } else if (booking.ta === 'Stephanie') {
                            secondLine = `ITRA: ${booking.ta}`;
                        } else if (booking.ta) {
                            secondLine = `TA: ${booking.ta}`;
                        } else {
                            secondLine = `TA: `; // 如果沒有選 TA，顯示空白的 TA
                        }
                    }

                    const isGrade1Tech = /^[1][A-E]/.test(booking.className) && booking.subject?.includes('科技');
                    const isSystemFixed = (booking.isRecurring || (booking.cart === '3號車' && booking.subject?.includes('科技'))) && !isGrade1Tech;

                    return (
                        <div key={booking.id} className={`group p-1.5 sm:p-2 rounded-lg border w-full flex flex-col justify-start shadow-sm h-[65px] sm:h-[70px] mb-1 overflow-hidden ${themeStyles.bg} ${themeStyles.border} ${themeStyles.text}`}>
                            {/* Top row: Class, Subject, Teacher AND Action Button */}
                            <div className="flex justify-between items-start text-[11px] sm:text-[13px] font-bold mb-0.5 space-x-1 overflow-hidden w-full">
                                <span className="whitespace-normal break-words leading-tight flex-1 min-w-0 text-left">
                                    {booking.className} {booking.subject}({booking.teacher})
                                </span>
                                {/* Action button / Status */}
                                <div className="flex items-start flex-shrink-0 leading-tight text-right ml-auto">
